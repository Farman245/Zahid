<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Qari Hosiery Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        function App() {
            return (
                <div className="min-h-screen bg-emerald-900 flex flex-col items-center justify-center text-white p-6 text-center">
                    <h1 className="text-5xl font-extrabold mb-4">New Qari Hosiery</h1>
                    <p className="text-xl mb-8 opacity-80">Premium Quality Wholesale Store</p>
                    <div className="bg-white/10 p-8 rounded-3xl backdrop-blur-lg border border-white/20 shadow-2xl">
                        <i className="fas fa-link text-4xl mb-4 text-emerald-400"></i>
                        <h2 className="text-2xl font-bold">Domain Connecting...</h2>
                        <p className="text-sm mt-3 opacity-70">We are linking your custom domain. <br/> This may take up to 30 minutes.</p>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
