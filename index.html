<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Qari Hosiery Store | Wholesale</title>
    
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '395432518120120'); 
      fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=395432518120120&ev=PageView&noscript=1"
    /></noscript>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes slideInFromLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        .animate-sidebar { animation: slideInFromLeft 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-modal { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const firebaseConfig = {
            apiKey: "AIzaSyCxr3iEVkcaqKyP7Mcmb1eZafcPGLOJUB0",
            authDomain: "numan-8e439.firebaseapp.com",
            projectId: "numan-8e439",
            storageBucket: "numan-8e439.firebasestorage.app",
            messagingSenderId: "791551549061",
            appId: "1:791551549061:web:757340191fd3e6425d53ec"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const categories = ['All', 'Socks', 'Vests', 'Caps', 'Trousers', 'Undergarments', 'Accessories'];

        function App() {
            const [view, setView] = useState('home');
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [isAdmin, setIsAdmin] = useState(false);
            const [secretClicks, setSecretClicks] = useState(0);
            const [searchQuery, setSearchQuery] = useState('');
            const [activeTab, setActiveTab] = useState('Menu');

            useEffect(() => {
                const unsubscribe = db.collection("products").onSnapshot(snap => {
                    setProducts(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
                    setIsLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const calculatePrice = (product, qty) => {
                let price = product.price;
                if (product.bulkQty && qty >= product.bulkQty) price = product.bulkPrice;
                return price;
            };

            const Navbar = () => (
                <nav className="bg-white text-gray-800 sticky top-0 z-50 shadow-sm border-b border-gray-100">
                    <div className="bg-red-600 text-white text-[11px] py-2 px-4 flex justify-between items-center font-medium">
                        <span>Welcome to Qari Hosiery | Wholesale Faisalabad market rates</span>
                        <div className="flex gap-3 items-center">
                            <i className="fab fa-whatsapp"></i><i className="fab fa-facebook-f"></i><i className="fab fa-instagram"></i>
                        </div>
                    </div>
                    <div className="p-4 flex justify-between items-center">
                        <button onClick={() => setIsMenuOpen(true)} className="flex items-center gap-2 text-gray-600">
                            <i className="fas fa-bars text-xl"></i>
                            <span className="font-bold text-sm uppercase hidden sm:inline">Menu</span>
                        </button>
                        <h1 className="font-bold text-xl select-none text-gray-900 cursor-pointer" onClick={() => {
                            setSecretClicks(c => { if(c+1 >=3) setView('admin'); return c+1; });
                            setTimeout(()=>setSecretClicks(0), 2000);
                        }}>
                            <span className="text-red-600">New Qari</span> <span className="text-yellow-500">Hosiery</span>
                        </h1>
                        <button onClick={() => setView('cart')} className="relative p-2 text-gray-600">
                            <i className="fas fa-shopping-bag text-2xl"></i>
                            {cart.length > 0 && <span className="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center border-2 border-white">{cart.reduce((a,b)=>a+b.quantity, 0)}</span>}
                        </button>
                    </div>
                </nav>
            );

            const Sidebar = () => (
                <div className={`fixed inset-0 z-[100] flex ${isMenuOpen ? '' : 'pointer-events-none'}`}>
                    <div className={`fixed inset-0 bg-black/50 transition-opacity duration-300 ${isMenuOpen ? 'opacity-100' : 'opacity-0'}`} onClick={() => setIsMenuOpen(false)}></div>
                    <div className={`relative bg-white w-full max-w-xs h-full flex flex-col animate-sidebar shadow-2xl transition-transform duration-300 ${isMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="p-4 border-b">
                            <div className="relative">
                                <input type="text" placeholder="Search products..." className="w-full pl-4 pr-10 py-3 bg-gray-50 rounded-xl border outline-none text-sm" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                                <i className="fas fa-search absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            </div>
                        </div>
                        <div className="flex border-b text-center font-bold text-sm uppercase">
                            <button onClick={() => setActiveTab('Menu')} className={`flex-1 py-4 border-b-2 ${activeTab === 'Menu' ? 'border-red-600 text-red-600' : 'border-transparent text-gray-500'}`}>Menu</button>
                            <button onClick={() => setActiveTab('Categories')} className={`flex-1 py-4 border-b-2 ${activeTab === 'Categories' ? 'border-red-600 text-red-600' : 'border-transparent text-gray-500'}`}>Categories</button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4">
                            {activeTab === 'Menu' ? (
                                <div className="space-y-2">
                                    <button className="w-full text-left p-4 rounded-xl hover:bg-red-50 font-medium" onClick={() => {setView('home'); setIsMenuOpen(false);}}>Home</button>
                                    <button className="w-full text-left p-4 rounded-xl hover:bg-red-50 font-medium" onClick={() => {setView('home'); setIsMenuOpen(false);}}>About Us</button>
                                </div>
                            ) : (
                                <div className="space-y-2">
                                    {categories.map(c => (
                                        <button key={c} className={`w-full text-left p-4 rounded-xl font-medium ${selectedCategory === c ? 'bg-red-600 text-white' : 'hover:bg-red-50'}`} onClick={() => {setSelectedCategory(c); setView('home'); setIsMenuOpen(false);}}>{c}</button>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );

            const ProductModal = () => {
                if (!selectedProduct) return null;
                const p = selectedProduct;
                const [qty, setQty] = useState(1);
                const currentPrice = calculatePrice(p, qty);
                const isOutOfStock = p.inStock === false;

                return (
                    <div className="fixed inset-0 z-[110] flex items-end sm:items-center justify-center bg-black/60 p-0 sm:p-4">
                        <div className="bg-white w-full max-w-lg rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 animate-modal overflow-y-auto max-h-[90vh] hide-scrollbar">
                            <div className="flex justify-between items-start mb-6">
                                <div>
                                    <h2 className="text-2xl font-black text-gray-800">{p.name}</h2>
                                    <span className="bg-gray-100 text-gray-500 px-3 py-1 rounded-full text-[10px] font-black uppercase mt-2 inline-block">Code: {p.itemCode || p.id.slice(0,4)}</span>
                                </div>
                                <button onClick={() => setSelectedProduct(null)} className="bg-gray-100 p-2 rounded-full"><i className="fas fa-times"></i></button>
                            </div>
                            <div className="relative mb-6">
                                <img src={p.image} className={`w-full h-64 object-cover rounded-3xl shadow-sm ${isOutOfStock ? 'opacity-50 grayscale' : ''}`} />
                                {isOutOfStock && <div className="absolute inset-0 flex items-center justify-center"><span className="bg-red-600 text-white px-6 py-2 font-black text-xl transform -rotate-12 rounded-xl border-4 border-white shadow-xl">SOLD OUT</span></div>}
                            </div>
                            <div className="space-y-6">
                                <div className="grid grid-cols-2 gap-6">
                                    <div><h4 className="text-xs font-black text-gray-400 uppercase mb-2">Sizes</h4><p className="font-bold text-red-600">{p.sizes || "Standard"}</p></div>
                                    <div><h4 className="text-xs font-black text-gray-400 uppercase mb-2">Colors</h4><p className="font-bold text-red-600">{p.colors || "Mixed"}</p></div>
                                </div>
                                {!isOutOfStock && (
                                    <div className="flex items-center justify-between pt-4 border-t">
                                        <div className="flex items-center gap-4 bg-gray-100 p-2 rounded-2xl">
                                            <button onClick={() => setQty(Math.max(1, qty - 1))} className="w-10 h-10 bg-white rounded-xl shadow-sm">-</button>
                                            <span className="font-black w-8 text-center text-lg">{qty}</span>
                                            <button onClick={() => setQty(qty + 1)} className="w-10 h-10 bg-white rounded-xl shadow-sm">+</button>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-xs text-gray-400 font-bold uppercase">Total</p>
                                            <p className="text-2xl font-black text-red-600">Rs. {currentPrice * qty}</p>
                                        </div>
                                    </div>
                                )}
                                <button disabled={isOutOfStock} onClick={() => {
                                    setCart(prev => {
                                        const ex = prev.find(i => i.id === p.id);
                                        if(ex) return prev.map(i => i.id === p.id ? {...i, quantity: i.quantity + qty} : i);
                                        return [...prev, { ...p, quantity: qty, finalPrice: currentPrice }];
                                    });
                                    setSelectedProduct(null);
                                }} className={`w-full py-5 rounded-3xl font-black text-lg ${isOutOfStock ? 'bg-gray-300 text-gray-500' : 'bg-red-600 text-white'}`}>
                                    {isOutOfStock ? 'Out of Stock' : 'Add to Cart'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const Home = () => {
                const filtered = products.filter(p => (selectedCategory === 'All' || p.category === selectedCategory) && p.name.toLowerCase().includes(searchQuery.toLowerCase()));
                return (
                    <div>
                        <div className="relative h-64 bg-gray-900 flex items-center justify-center text-center px-6">
                            <div className="absolute inset-0 opacity-30 bg-[url('https://images.unsplash.com/photo-1603251493015-844a4e8d3809?q=80&w=1000')] bg-cover bg-center"></div>
                            <div className="relative z-10 text-white">
                                <h2 className="text-4xl font-black mb-1 uppercase tracking-tighter">hosiery</h2>
                                <p className="text-sm font-medium opacity-80">Premium Faisalabad wholesale market rates</p>
                            </div>
                        </div>
                        <div className="p-4 grid grid-cols-2 md:grid-cols-4 gap-4 max-w-7xl mx-auto py-10">
                            {isLoading ? <p className="col-span-full text-center py-20 font-medium opacity-50">Loading...</p> : 
                             filtered.map(p => {
                                const isOutOfStock = p.inStock === false;
                                return (
                                <div key={p.id} onClick={() => !isOutOfStock && setSelectedProduct(p)} className={`bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden flex flex-col group relative cursor-pointer ${isOutOfStock ? 'opacity-70 grayscale' : ''}`}>
                                    <div className="absolute top-3 left-3 bg-white/90 px-2 py-1 rounded-lg text-[10px] font-black z-10 border shadow-sm">Code: {p.itemCode || p.id.slice(0,4)}</div>
                                    <div className="absolute top-3 right-3 bg-red-600 text-white px-3 py-1.5 rounded-full text-[10px] font-black z-10 flex items-center gap-1 shadow-md">
                                        <i className="fas fa-fire text-[9px]"></i> {p.fakeSold || "500+"} Sold
                                    </div>
                                    <img src={p.image} className="w-full h-48 object-cover" />
                                    <div className="p-5 flex-1 flex flex-col">
                                        <h3 className="font-bold text-gray-900 mb-1 line-clamp-1">{p.name}</h3>
                                        <p className="text-red-600 font-black text-xl">Rs. {p.price}</p>
                                        <p className="text-[10px] text-gray-400 font-bold uppercase mb-4">/ {p.unit}</p>
                                        <button className={`mt-auto w-full py-3 rounded-2xl text-xs font-black ${isOutOfStock ? 'bg-gray-200 text-gray-500' : 'bg-red-50 text-red-600 hover:bg-red-600 hover:text-white transition-colors'}`}>
                                            {isOutOfStock ? 'Out of Stock' : 'View Details'}
                                        </button>
                                    </div>
                                </div>
                            )})}
                        </div>
                    </div>
                );
            };

            const AdminPanel = () => {
                const [pForm, setPForm] = useState({ name: '', itemCode: '', price: '', unit: '', category: 'Socks', description: '', sizes: '', colors: '', bulkQty: '', bulkPrice: '', inStock: true, fakeSold: '' });
                const [editId, setEditId] = useState(null);
                const [imgFile, setImgFile] = useState(null);
                const [isSaving, setIsSaving] = useState(false);

                const saveProduct = async (e) => {
                    e.preventDefault();
                    setIsSaving(true);
                    try {
                        let imgUrl = editId ? products.find(p => p.id === editId).image : "";
                        if (imgFile) {
                            const reader = new FileReader();
                            reader.readAsDataURL(imgFile);
                            imgUrl = await new Promise(res => { reader.onload = (ev) => res(ev.target.result); });
                        }
                        const finalData = { ...pForm, price: Number(pForm.price), inStock: pForm.inStock, image: imgUrl };
                        if (editId) await db.collection("products").doc(editId).update(finalData);
                        else await db.collection("products").add(finalData);
                        alert("Done!"); setEditId(null); setPForm({ name: '', itemCode: '', price: '', unit: '', category: 'Socks', description: '', sizes: '', colors: '', bulkQty: '', bulkPrice: '', inStock: true, fakeSold: '' });
                    } catch (err) { alert("Error"); }
                    setIsSaving(false);
                };

                if(!isAdmin) return (
                    <div className="p-10 text-center flex flex-col items-center mt-20">
                        <i className="fas fa-lock text-5xl text-gray-300 mb-6"></i>
                        <h2 className="text-2xl font-bold mb-8">Admin Login</h2>
                        <input type="password" placeholder="Enter Secret PIN" className="border-2 p-4 rounded-2xl w-full max-w-xs text-center text-2xl outline-none focus:border-red-500 shadow-sm" onChange={e => e.target.value === '7860' && setIsAdmin(true)} />
                    </div>
                );

                return (
                    <div className="p-6 max-w-2xl mx-auto space-y-8 py-10">
                        <div className="flex justify-between items-center"><h2 className="text-2xl font-black">Admin Panel</h2><button onClick={()=>setIsAdmin(false)} className="text-red-600 font-bold">Logout</button></div>
                        <form className="space-y-4 bg-white p-6 rounded-3xl shadow-lg border" onSubmit={saveProduct}>
                            <input required placeholder="Name" className="w-full p-4 bg-gray-50 rounded-2xl outline-none" value={pForm.name} onChange={e=>setPForm({...pForm, name:e.target.value})} />
                            <div className="grid grid-cols-2 gap-4">
                                <input placeholder="Price" className="p-4 bg-gray-50 rounded-2xl outline-none" value={pForm.price} onChange={e=>setPForm({...pForm, price:e.target.value})} />
                                <input placeholder="Unit" className="p-4 bg-gray-50 rounded-2xl outline-none" value={pForm.unit} onChange={e=>setPForm({...pForm, unit:e.target.value})} />
                            </div>
                            <label className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl cursor-pointer">
                                <input type="checkbox" checked={pForm.inStock} onChange={e=>setPForm({...pForm, inStock: e.target.checked})} className="w-6 h-6 accent-red-600" />
                                <span className="font-bold">Item Available in Stock</span>
                            </label>
                            <input type="file" className="w-full p-2" onChange={e=>setImgFile(e.target.files[0])} />
                            <button className="w-full bg-red-600 text-white py-5 rounded-2xl font-black shadow-lg">Save Product</button>
                        </form>
                        <div className="space-y-3 pt-10">
                            {products.map(p => (
                                <div key={p.id} className="bg-white p-4 rounded-2xl flex items-center justify-between border shadow-sm">
                                    <div className="flex items-center gap-4"><img src={p.image} className="w-12 h-12 rounded-xl object-cover" /><div><p className="font-bold">{p.name}</p><p className="text-xs font-bold text-red-600">Rs. {p.price}</p></div></div>
                                    <div className="flex gap-2">
                                        <button onClick={()=>{setPForm(p); setEditId(p.id); window.scrollTo(0,0);}} className="text-blue-500 p-2"><i className="fas fa-edit"></i></button>
                                        <button onClick={() => confirm("Delete?") && db.collection("products").doc(p.id).delete()} className="text-red-400 p-2"><i className="fas fa-trash"></i></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen">
                    <Navbar /><Sidebar />
                    {view === 'home' && <Home />}
                    {view === 'admin' && <AdminPanel />}
                    {view === 'cart' && (
                        <div className="p-8 max-w-3xl mx-auto py-12">
                            <h2 className="text-4xl font-black mb-10 tracking-tighter">My Cart</h2>
                            {cart.length === 0 ? <p className="text-center py-20 text-gray-300 font-bold">Bag is empty.</p> : (
                                <div className="space-y-4">
                                    {cart.map((item, idx) => (
                                        <div key={idx} className="bg-white p-6 rounded-3xl border flex items-center gap-6 shadow-sm relative">
                                            <img src={item.image} className="w-20 h-20 rounded-2xl object-cover" />
                                            <div className="flex-1"><p className="font-bold">{item.name}</p><p className="text-red-600 font-bold">Rs. {item.finalPrice} x {item.quantity}</p></div>
                                            <button onClick={() => setCart(prev => prev.filter((_, i) => i !== idx))} className="text-red-300 p-2"><i className="fas fa-trash"></i></button>
                                        </div>
                                    ))}
                                    <div className="bg-gray-900 text-white p-10 rounded-[2.5rem] shadow-2xl mt-12 text-center">
                                        <div className="flex justify-between text-3xl font-black mb-8"><span>Total Bill</span><span>Rs. {cart.reduce((a,b)=>a+(b.finalPrice*b.quantity), 0)}</span></div>
                                        <button className="w-full bg-red-600 text-white py-6 rounded-2xl font-black text-xl" onClick={() => {
                                            const total = cart.reduce((a,b)=>a+(b.finalPrice*b.quantity), 0);
                                            const msg = `*New Order*%0A%0A*Items:*%0A${cart.map(i => `- [Code: ${i.itemCode || i.id.slice(0,4)}] ${i.name} x${i.quantity}`).join('%0A')}%0A%0A*Total:* Rs. ${total}`;
                                            window.open(`https://wa.me/923065378112?text=${msg}`);
                                            setCart([]); setView('home');
                                        }}>WhatsApp Order <i className="fab fa-whatsapp ml-2"></i></button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                    <ProductModal />
                    <a href="https://wa.me/923065378112" target="_blank" className="fixed bottom-6 right-6 z-40 bg-emerald-500 text-white w-16 h-16 rounded-full flex items-center justify-center text-3xl shadow-2xl border-4 border-white"><i className="fab fa-whatsapp"></i></a>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
