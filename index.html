<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Qari Hosiery Store | Wholesale</title>
    
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '395432518120120'); 
      fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=395432518120120&ev=PageView&noscript=1"
    /></noscript>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-modal { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const firebaseConfig = {
            apiKey: "AIzaSyCxr3iEVkcaqKyP7Mcmb1eZafcPGLOJUB0",
            authDomain: "numan-8e439.firebaseapp.com",
            projectId: "numan-8e439",
            storageBucket: "numan-8e439.firebasestorage.app",
            messagingSenderId: "791551549061",
            appId: "1:791551549061:web:757340191fd3e6425d53ec"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // Added 'Socks' to categories
        const categories = ['All', 'Socks', 'Vests', 'Caps', 'Trousers', 'Undergarments', 'Accessories'];

        function App() {
            const [view, setView] = useState('home');
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [isAdmin, setIsAdmin] = useState(false);
            const [secretClicks, setSecretClicks] = useState(0);

            useEffect(() => {
                const unsubscribe = db.collection("products").onSnapshot(snap => {
                    setProducts(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
                    setIsLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const calculatePrice = (product, qty) => {
                let price = product.price;
                if (product.bulkQty && qty >= product.bulkQty) price = product.bulkPrice;
                return price;
            };

            const Navbar = () => (
                <nav className="bg-emerald-800 text-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
                    <div className="flex items-center gap-4">
                        <button onClick={() => setIsMenuOpen(true)} className="p-2"><i className="fas fa-bars text-xl"></i></button>
                        <h1 className="font-bold text-lg select-none" onClick={() => {
                            setSecretClicks(c => { if(c+1 >=3) setView('admin'); return c+1; });
                            setTimeout(()=>setSecretClicks(0), 2000);
                        }}>New Qari Hosiery</h1>
                    </div>
                    <button onClick={() => setView('cart')} className="relative p-2">
                        <i className="fas fa-shopping-bag text-2xl"></i>
                        {cart.length > 0 && <span className="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center">{cart.length}</span>}
                    </button>
                </nav>
            );

            const ProductModal = () => {
                if (!selectedProduct) return null;
                const p = selectedProduct;
                const [qty, setQty] = useState(1);
                const currentPrice = calculatePrice(p, qty);
                const isOutOfStock = p.inStock === false;

                return (
                    <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center bg-black/60 p-0 sm:p-4">
                        <div className="bg-white w-full max-w-lg rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 animate-modal overflow-y-auto max-h-[90vh] hide-scrollbar">
                            <div className="flex justify-between items-start mb-6">
                                <div>
                                    <h2 className="text-2xl font-black text-gray-800">{p.name}</h2>
                                    <span className="bg-gray-100 text-gray-500 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest mt-2 inline-block">Code: {p.itemCode || p.id.slice(0,4)}</span>
                                </div>
                                <button onClick={() => setSelectedProduct(null)} className="bg-gray-100 p-2 rounded-full"><i className="fas fa-times"></i></button>
                            </div>
                            
                            <div className="relative">
                                <img src={p.image} className={`w-full h-64 object-cover rounded-3xl mb-6 shadow-sm ${isOutOfStock ? 'opacity-50 grayscale' : ''}`} />
                                {isOutOfStock && <div className="absolute inset-0 flex items-center justify-center"><span className="bg-red-600 text-white px-6 py-2 font-black tracking-widest text-xl transform -rotate-12 rounded-xl border-4 border-white shadow-xl">OUT OF STOCK</span></div>}
                            </div>
                            
                            <div className="space-y-6">
                                <div>
                                    <h4 className="text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Description</h4>
                                    <p className="text-gray-600 leading-relaxed">{p.description || "Premium quality hosiery product from Faisalabad market."}</p>
                                </div>
                                
                                <div className="grid grid-cols-2 gap-6">
                                    <div>
                                        <h4 className="text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Sizes</h4>
                                        <p className="font-bold text-emerald-800">{p.sizes || "Standard"}</p>
                                    </div>
                                    <div>
                                        <h4 className="text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Colors</h4>
                                        <p className="font-bold text-emerald-800">{p.colors || "Mixed"}</p>
                                    </div>
                                </div>

                                {p.bulkQty && (
                                    <div className="bg-emerald-50 p-4 rounded-2xl border border-emerald-100">
                                        <p className="text-xs font-bold text-emerald-700">🔥 WHOLESALE OFFER:</p>
                                        <p className="text-sm font-medium">Buy {p.bulkQty} {p.unit} or more for <span className="font-black text-emerald-800">Rs. {p.bulkPrice}</span> / {p.unit}</p>
                                    </div>
                                )}

                                {!isOutOfStock && (
                                    <div className="flex items-center justify-between pt-4 border-t">
                                        <div className="flex items-center gap-4 bg-gray-100 p-2 rounded-2xl">
                                            <button onClick={() => setQty(Math.max(1, qty - 1))} className="w-10 h-10 bg-white rounded-xl shadow-sm">-</button>
                                            <span className="font-black w-8 text-center text-lg">{qty}</span>
                                            <button onClick={() => setQty(qty + 1)} className="w-10 h-10 bg-white rounded-xl shadow-sm">+</button>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-xs text-gray-400 font-bold uppercase">Total Price</p>
                                            <p className="text-2xl font-black text-emerald-800">Rs. {currentPrice * qty}</p>
                                        </div>
                                    </div>
                                )}

                                <button disabled={isOutOfStock} onClick={() => {
                                    setCart(prev => [...prev, { ...p, quantity: qty, finalPrice: currentPrice }]);
                                    setSelectedProduct(null);
                                    if(typeof fbq !== 'undefined') fbq('track', 'AddToCart', {content_name: p.name, value: currentPrice * qty, currency: 'PKR'});
                                }} className={`w-full py-5 rounded-3xl font-black text-lg shadow-xl active:scale-95 transition-transform ${isOutOfStock ? 'bg-gray-300 text-gray-500 cursor-not-allowed shadow-none' : 'bg-emerald-800 text-white hover:bg-emerald-900'}`}>
                                    {isOutOfStock ? 'Currently Unavailable' : 'Add to Cart'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const AdminPanel = () => {
                const [pForm, setPForm] = useState({ name: '', itemCode: '', price: '', unit: '', category: 'Socks', description: '', sizes: '', colors: '', bulkQty: '', bulkPrice: '', inStock: true, fakeSold: '' });
                const [editId, setEditId] = useState(null);
                const [imgFile, setImgFile] = useState(null);
                const [isSaving, setIsSaving] = useState(false);

                const saveProduct = async (e) => {
                    e.preventDefault();
                    setIsSaving(true);
                    try {
                        let imgUrl = editId ? products.find(p => p.id === editId).image : "";
                        if (imgFile) {
                            const reader = new FileReader();
                            reader.readAsDataURL(imgFile);
                            imgUrl = await new Promise(res => {
                                reader.onload = (ev) => res(ev.target.result);
                            });
                        }
                        
                        const finalCode = pForm.itemCode || Math.floor(1000 + Math.random() * 9000).toString();
                        const finalSold = pForm.fakeSold || (Math.floor(100 + Math.random() * 800).toString() + "+");

                        const finalData = { 
                            ...pForm, 
                            itemCode: finalCode,
                            fakeSold: finalSold,
                            price: Number(pForm.price), 
                            bulkQty: pForm.bulkQty ? Number(pForm.bulkQty) : null,
                            bulkPrice: pForm.bulkPrice ? Number(pForm.bulkPrice) : null,
                            image: imgUrl 
                        };
                        
                        if (editId) await db.collection("products").doc(editId).update(finalData);
                        else await db.collection("products").add(finalData);
                        
                        alert("Product Saved!");
                        setEditId(null); 
                        setPForm({ name: '', itemCode: '', price: '', unit: '', category: 'Socks', description: '', sizes: '', colors: '', bulkQty: '', bulkPrice: '', inStock: true, fakeSold: '' });
                        setImgFile(null);
                    } catch (err) { alert("Error saving product"); }
                    setIsSaving(false);
                };

                const editProduct = (p) => {
                    setEditId(p.id);
                    setPForm({
                        name: p.name || '', itemCode: p.itemCode || '', price: p.price || '', unit: p.unit || '', category: p.category || 'Socks', description: p.description || '', sizes: p.sizes || '', colors: p.colors || '', bulkQty: p.bulkQty || '', bulkPrice: p.bulkPrice || '', inStock: p.inStock !== false, fakeSold: p.fakeSold || ''
                    });
                    window.scrollTo(0,0);
                };

                if(!isAdmin) return (
                    <div className="p-10 text-center flex flex-col items-center">
                        <h2 className="text-2xl font-bold mb-6">Admin Login</h2>
                        <input type="password" placeholder="PIN (7860)" className="border-2 p-4 rounded-2xl w-full max-w-xs text-center text-2xl outline-none focus:border-emerald-500" onChange={e => e.target.value === '7860' && setIsAdmin(true)} />
                    </div>
                );

                return (
                    <div className="p-6 max-w-2xl mx-auto space-y-8">
                        <div className="flex justify-between items-center">
                            <h2 className="text-2xl font-black text-emerald-800">{editId ? "Edit Product" : "Add New Product"}</h2>
                            <button onClick={()=>setIsAdmin(false)} className="text-red-500 font-bold bg-red-50 px-4 py-2 rounded-xl">Logout</button>
                        </div>
                        
                        <form className="space-y-6 bg-white p-8 rounded-[2rem] shadow-xl border border-gray-100" onSubmit={saveProduct}>
                            
                            {/* Stock & Marketing Status */}
                            <div className="bg-yellow-50 p-4 rounded-2xl border border-yellow-200 grid grid-cols-2 gap-4 items-center">
                                <label className="flex items-center gap-3 cursor-pointer">
                                    <input type="checkbox" checked={pForm.inStock} onChange={e=>setPForm({...pForm, inStock: e.target.checked})} className="w-6 h-6 accent-emerald-600 rounded" />
                                    <span className={`font-black ${pForm.inStock ? 'text-emerald-700' : 'text-red-600'}`}>{pForm.inStock ? "Item In Stock" : "Out of Stock"}</span>
                                </label>
                                <div>
                                    <input placeholder="Fake Sold Qty (e.g. 500+)" className="w-full p-3 bg-white rounded-xl outline-none border border-yellow-300 text-sm font-bold" value={pForm.fakeSold} onChange={e=>setPForm({...pForm, fakeSold:e.target.value})} />
                                    <p className="text-[9px] text-gray-500 mt-1">Leave empty for random numbers</p>
                                </div>
                            </div>

                            <div className="space-y-4">
                                <label className="block text-xs font-black text-gray-400 uppercase tracking-widest ml-2">Basic Info</label>
                                <div className="grid grid-cols-3 gap-4">
                                    <div className="col-span-2">
                                        <input required placeholder="Product Name" className="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:border-emerald-500" value={pForm.name} onChange={e=>setPForm({...pForm, name:e.target.value})} />
                                    </div>
                                    <div className="col-span-1">
                                        <input placeholder="Code (A-101)" className="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:border-emerald-500 font-bold" value={pForm.itemCode} onChange={e=>setPForm({...pForm, itemCode:e.target.value})} />
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <input required type="number" placeholder="Regular Price" className="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:border-emerald-500" value={pForm.price} onChange={e=>setPForm({...pForm, price:e.target.value})} />
                                    <input required placeholder="Unit (e.g. Dozen)" className="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:border-emerald-500" value={pForm.unit} onChange={e=>setPForm({...pForm, unit:e.target.value})} />
                                </div>
                            </div>

                            <div className="space-y-4">
                                <label className="block text-xs font-black text-gray-400 uppercase tracking-widest ml-2">Variations</label>
                                <div className="grid grid-cols-2 gap-4">
                                    <input placeholder="Sizes (e.g. S, M, L)" className="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:border-emerald-500" value={pForm.sizes} onChange={e=>setPForm({...pForm, sizes:e.target.value})} />
                                    <input placeholder="Colors (e.g. Black, White)" className="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:border-emerald-500" value={pForm.colors} onChange={e=>setPForm({...pForm, colors:e.target.value})} />
                                </div>
                            </div>

                            <div className="bg-emerald-50 p-6 rounded-[2rem] space-y-4 border border-emerald-100">
                                <label className="block text-xs font-black text-emerald-700 uppercase tracking-widest">Wholesale Pricing</label>
                                <div className="grid grid-cols-2 gap-4">
                                    <input type="number" placeholder="Bulk Qty (e.g. 10)" className="w-full p-4 bg-white rounded-2xl outline-none focus:border-emerald-500" value={pForm.bulkQty} onChange={e=>setPForm({...pForm, bulkQty:e.target.value})} />
                                    <input type="number" placeholder="Bulk Price (e.g. 450)" className="w-full p-4 bg-white rounded-2xl outline-none focus:border-emerald-500" value={pForm.bulkPrice} onChange={e=>setPForm({...pForm, bulkPrice:e.target.value})} />
                                </div>
                            </div>

                            <div className="space-y-4">
                                <label className="block text-xs font-black text-gray-400 uppercase tracking-widest ml-2">Details & Image</label>
                                <textarea placeholder="Description..." className="w-full p-4 bg-gray-50 rounded-2xl outline-none h-28 focus:border-emerald-500" value={pForm.description} onChange={e=>setPForm({...pForm, description:e.target.value})} />
                                <select className="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:border-emerald-500 font-bold" value={pForm.category} onChange={e=>setPForm({...pForm, category:e.target.value})}>
                                    {categories.filter(c=>c!=='All').map(c=><option key={c} value={c}>{c}</option>)}
                                </select>
                                <input type="file" className="block w-full p-2 bg-gray-50 rounded-2xl text-sm" onChange={e=>setImgFile(e.target.files[0])} />
                            </div>

                            <button disabled={isSaving} className="w-full bg-emerald-800 text-white py-5 rounded-[1.5rem] font-black shadow-xl hover:bg-emerald-900 active:scale-95">
                                {isSaving ? "Saving..." : (editId ? "Update Product" : "Save Product")}
                            </button>
                        </form>
                        
                        <div className="space-y-3 pt-8">
                            <h3 className="font-bold text-gray-400 text-xs uppercase px-2">Inventory ({products.length})</h3>
                            {products.map(p => (
                                <div key={p.id} className={`bg-white p-4 rounded-2xl flex items-center justify-between border shadow-sm ${p.inStock===false?'opacity-60':''}`}>
                                    <div className="flex items-center gap-4">
                                        <img src={p.image} className="w-12 h-12 rounded-xl object-cover" />
                                        <div>
                                            <p className="font-bold text-sm">{p.name} {p.inStock===false && <span className="text-[10px] text-red-500 font-black ml-1">(OUT)</span>}</p>
                                            <p className="text-[10px] bg-gray-100 px-2 py-0.5 rounded text-gray-500 font-bold inline-block mr-2">{p.itemCode || p.id.slice(0,4)}</p>
                                            <span className="text-xs font-bold text-emerald-700">Rs. {p.price}</span>
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={()=>editProduct(p)} className="text-blue-500 p-2 bg-blue-50 rounded-full"><i className="fas fa-edit"></i></button>
                                        <button onClick={() => confirm("Delete this product?") && db.collection("products").doc(p.id).delete()} className="text-red-400 p-2 bg-red-50 rounded-full"><i className="fas fa-trash"></i></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen">
                    <Navbar />
                    {isMenuOpen && (
                        <div className="fixed inset-0 z-[60] flex">
                            <div className="bg-black/50 flex-1" onClick={() => setIsMenuOpen(false)}></div>
                            <div className="bg-white w-80 p-8 animate-menu flex flex-col">
                                <h3 className="font-black text-2xl text-emerald-800 mb-10">Categories</h3>
                                <div className="space-y-2">
                                    {categories.map(c => (
                                        <button key={c} className={`w-full text-left p-4 rounded-2xl font-bold ${selectedCategory === c ? 'bg-emerald-800 text-white shadow-xl' : 'hover:bg-emerald-50'}`} onClick={() => {setSelectedCategory(c); setView('home'); setIsMenuOpen(false);}}>{c}</button>
                                    ))}
                                </div>
                                <button className="mt-auto p-4 text-gray-400 font-bold" onClick={() => {setView('home'); setIsMenuOpen(false);}}>Close Menu</button>
                            </div>
                        </div>
                    )}

                    {view === 'home' && (
                        <div>
                            <div className="bg-emerald-900 text-white p-10 pb-20 text-center">
                                <h2 className="text-4xl font-black mb-2 tracking-tighter">Wholesale Market</h2>
                                <p className="opacity-70 text-sm">Best Quality Hosiery from Faisalabad</p>
                            </div>
                            <div className="p-6 -mt-10 grid grid-cols-2 md:grid-cols-4 gap-6 max-w-7xl mx-auto">
                                {isLoading ? <p className="col-span-full text-center py-20 font-bold opacity-30 italic">Loading Collection...</p> : 
                                 products.filter(p => selectedCategory === 'All' || p.category === selectedCategory).map(p => {
                                    const isOutOfStock = p.inStock === false;
                                    return (
                                    <div key={p.id} onClick={() => setSelectedProduct(p)} className={`bg-white rounded-[2rem] shadow-lg border border-gray-100 overflow-hidden flex flex-col cursor-pointer hover:shadow-2xl transition-all relative ${isOutOfStock ? 'opacity-70 grayscale' : ''}`}>
                                        
                                        {/* Fake Sold Badge */}
                                        <div className="absolute top-3 right-3 bg-red-100 text-red-700 px-2 py-1 rounded-lg text-[10px] font-black shadow-sm z-10 flex items-center gap-1 border border-red-200">
                                            <i className="fas fa-fire"></i> {p.fakeSold} Sold
                                        </div>

                                        <div className="absolute top-3 left-3 bg-white/90 backdrop-blur-sm px-2 py-1 rounded-lg text-[10px] font-black text-emerald-900 shadow-sm z-10 border">
                                            {p.itemCode || p.id.slice(0,4)}
                                        </div>

                                        {/* Out of stock overlay */}
                                        {isOutOfStock && <div className="absolute inset-0 bg-white/50 z-20 flex items-center justify-center pointer-events-none"><span className="bg-red-600 text-white font-black px-4 py-1 text-sm rounded-lg transform -rotate-12 border-2 border-white shadow-lg">SOLD OUT</span></div>}

                                        <img src={p.image} className="w-full h-48 object-cover" />
                                        <div className="p-5 flex-1 flex flex-col">
                                            <h3 className="font-black text-gray-800 mb-1 line-clamp-1">{p.name}</h3>
                                            <p className="text-emerald-800 font-black text-xl">Rs. {p.price}</p>
                                            <p className="text-[10px] text-gray-400 font-black uppercase mb-4 tracking-wider">Per {p.unit}</p>
                                            <button className={`mt-auto w-full py-3 rounded-2xl text-xs font-black ${isOutOfStock ? 'bg-red-50 text-red-600' : 'bg-emerald-50 text-emerald-800'}`}>
                                                {isOutOfStock ? 'Out of Stock' : 'View Details'}
                                            </button>
                                        </div>
                                    </div>
                                )})}
                            </div>
                        </div>
                    )}

                    <ProductModal />

                    {view === 'cart' && (
                        <div className="p-8 max-w-2xl mx-auto py-12">
                            <h2 className="text-4xl font-black mb-10 tracking-tighter">My Cart</h2>
                            {cart.length === 0 ? <p className="text-center py-20 text-gray-300 font-bold text-2xl">Cart is empty</p> : (
                                <div className="space-y-6">
                                    {cart.map((item, idx) => (
                                        <div key={idx} className="bg-white p-6 rounded-[2rem] border flex items-center gap-6 shadow-sm">
                                            <img src={item.image} className="w-20 h-20 rounded-2xl object-cover" />
                                            <div className="flex-1">
                                                <p className="font-black text-lg">{item.name}</p>
                                                <p className="text-emerald-700 font-bold">Rs. {item.finalPrice} x {item.quantity} {item.unit}</p>
                                            </div>
                                            <button onClick={() => setCart(prev => prev.filter((_, i) => i !== idx))} className="text-red-300 text-xl"><i className="fas fa-trash"></i></button>
                                        </div>
                                    ))}
                                    <div className="bg-emerald-900 text-white p-10 rounded-[3rem] shadow-2xl mt-12">
                                        <div className="flex justify-between text-3xl font-black mb-8"><span>Total</span><span>Rs. {cart.reduce((a,b)=>a+(b.finalPrice*b.quantity), 0)}</span></div>
                                        <button className="w-full bg-white text-emerald-900 py-6 rounded-[2rem] font-black text-xl shadow-lg active:scale-95 transition-transform" onClick={() => {
                                            const total = cart.reduce((a,b)=>a+(b.finalPrice*b.quantity), 0);
                                            const msg = `*New Wholesale Order*%0A%0A*Items:*%0A${cart.map(i => `- [Code: ${i.itemCode || i.id.slice(0,4)}] ${i.name} (Rs. ${i.finalPrice}) x${i.quantity} ${i.unit}`).join('%0A')}%0A%0A*Grand Total:* Rs. ${total}`;
                                            if(typeof fbq !== 'undefined') fbq('track', 'Purchase', {value: total, currency: 'PKR'});
                                            window.open(`https://wa.me/923065378112?text=${msg}`);
                                            setCart([]); setView('home');
                                        }}>Place Order via WhatsApp</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                    {view === 'admin' && <AdminPanel />}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
