<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Qari Hosiery | Wholesale & Dropshipping</title>
    
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '395432518120120');

    </script>
    <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=395432518120120&ev=PageView&noscript=1"/></noscript>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes slideInFromLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        .animate-sidebar { animation: slideInFromLeft 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-modal { animation: slideUp 0.3s ease-out; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const firebaseConfig = {
            apiKey: "AIzaSyCxr3iEVkcaqKyP7Mcmb1eZafcPGLOJUB0",
            authDomain: "numan-8e439.firebaseapp.com",
            projectId: "numan-8e439",
            storageBucket: "numan-8e439.firebasestorage.app",
            messagingSenderId: "791551549061",
            appId: "1:791551549061:web:757340191fd3e6425d53ec"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        const categories = [
            'All', 'Socks', 'Vests', 'Caps', 'Trousers', 'Undergarments', 
            'Men Unstitched', 'Men Stitched', 'Women Unstitched', 'Women Stitched', 
            'Kids Clothing', 'Shoes & Footwear', 'Bags & Wallets', 'Watches', 'Jewelry', 
            'Cosmetics & Beauty', 'Home & Bedding', 'Kitchen Accessories', 'Electronics', 
            'Mobile Accessories', 'Islamic Items', 'General Accessories'
        ];

        const DELIVERY_CHARGE = 150; 

        function App() {
            // Main State
            const [view, setView] = useState('home');
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [isAdmin, setIsAdmin] = useState(false);
            const [secretClicks, setSecretClicks] = useState(0);
            const [searchQuery, setSearchQuery] = useState('');
            const [activeTab, setActiveTab] = useState('Menu');

            // Product Modal State 
            const [modalQty, setModalQty] = useState(1);
            const [modalImgIndex, setModalImgIndex] = useState(0);

            // Auth State
            const [user, setUser] = useState(null);
            const [resellerProfile, setResellerProfile] = useState(null);
            const [showAuthModal, setShowAuthModal] = useState(false);
            const [authIsLogin, setAuthIsLogin] = useState(true);
            const [authEmail, setAuthEmail] = useState('');
            const [authPassword, setAuthPassword] = useState('');
            const [authName, setAuthName] = useState('');
            const [authPhone, setAuthPhone] = useState('');
            const [authStoreName, setAuthStoreName] = useState('');
            const [authCity, setAuthCity] = useState(''); 
            const [authLoading, setAuthLoading] = useState(false);

            // Dropshipping Checkout State
            const [showCheckout, setShowCheckout] = useState(false);
            const [orderForm, setOrderForm] = useState({
                customerName: '', customerPhone: '', customerAddress: '', customerCity: '',
                resellerProfit: '', resellerStoreName: ''
            });

            // Admin Panel State
            const [adminForm, setAdminForm] = useState({ name: '', itemCode: '', price: '', unit: '', category: 'Socks', description: '', sizes: '', colors: '', bulkQty: '', bulkPrice: '', inStock: true, fakeSold: '' });
            const [adminEditId, setAdminEditId] = useState(null);
            const [adminImgFiles, setAdminImgFiles] = useState([]);
            const [adminIsSaving, setAdminIsSaving] = useState(false);

            useEffect(() => {
                const unsubscribeAuth = auth.onAuthStateChanged(async (currentUser) => {
                    setUser(currentUser);
                    if (currentUser) {
                        const doc = await db.collection('resellers').doc(currentUser.uid).get();
                        if (doc.exists) {
                            setResellerProfile(doc.data());
                            setOrderForm(prev => ({...prev, resellerStoreName: doc.data().storeName || ''}));
                        }
                    } else {
                        setResellerProfile(null);
                    }
                });

                const unsubscribeProducts = db.collection("products").onSnapshot(snap => {
                    const fetchedProducts = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                    setProducts(fetchedProducts);
                    setIsLoading(false);

                    const urlParams = new URLSearchParams(window.location.search);
                    const productId = urlParams.get('p');
                    if (productId) {
                        const targetProduct = fetchedProducts.find(prod => prod.id === productId);
                        if (targetProduct) {
                            setSelectedProduct(targetProduct);
                            setModalQty(1);
                            setModalImgIndex(0);
                        }
                    }
                });
                return () => { unsubscribeAuth(); unsubscribeProducts(); };
            }, []);

            const calculatePrice = (product, qty) => {
                let price = product.price;
                if (product.bulkQty && qty >= product.bulkQty) price = product.bulkPrice;
                return price;
            };

            const handleAuthSubmit = async (e) => {
                e.preventDefault();
                setAuthLoading(true);
                try {
                    if (authIsLogin) {
                        await auth.signInWithEmailAndPassword(authEmail, authPassword);
                        setShowAuthModal(false);
                        if(cart.length > 0) setShowCheckout(true);
                    } else {
                        const userCred = await auth.createUserWithEmailAndPassword(authEmail, authPassword);
                        await db.collection('resellers').doc(userCred.user.uid).set({
                            name: authName, phone: authPhone, storeName: authStoreName, city: authCity, email: authEmail, createdAt: new Date()
                        });
                        setShowAuthModal(false);
                        if(cart.length > 0) setShowCheckout(true);
                    }
                } catch (error) {
                    alert(error.message);
                }
                setAuthLoading(false);
            };

            // ---- RENDER FUNCTIONS ---- //

            const renderAuthModal = () => {
                if (!showAuthModal) return null;
                return (
                    <div className="fixed inset-0 z-[120] flex items-center justify-center bg-black/60 p-4">
                        <div className="bg-white w-full max-w-md rounded-[2.5rem] p-8 animate-modal relative max-h-[90vh] overflow-y-auto hide-scrollbar">
                            <button onClick={() => setShowAuthModal(false)} className="absolute top-6 right-6 bg-gray-100 p-2 rounded-full w-10 h-10 flex items-center justify-center"><i className="fas fa-times"></i></button>
                            <h2 className="text-3xl font-black text-gray-900 mb-2">{authIsLogin ? 'Welcome Back!' : 'Become a Reseller'}</h2>
                            <p className="text-gray-500 mb-8 font-medium">{authIsLogin ? 'Login to place your dropship orders.' : 'Join our dropshipping network today.'}</p>
                            
                            <form onSubmit={handleAuthSubmit} className="space-y-4">
                                {!authIsLogin && (
                                    <>
                                        <input required placeholder="Your Full Name" className="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:border-red-500" value={authName} onChange={e=>setAuthName(e.target.value)} />
                                        <input required placeholder="WhatsApp Number" type="number" className="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:border-red-500" value={authPhone} onChange={e=>setAuthPhone(e.target.value)} />
                                        <input required placeholder="Your Store/Business Name" className="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:border-red-500" value={authStoreName} onChange={e=>setAuthStoreName(e.target.value)} />
                                        <input required placeholder="Your City" className="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:border-red-500" value={authCity} onChange={e=>setAuthCity(e.target.value)} />
                                    </>
                                )}
                                <input required type="email" placeholder="Email Address" className="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:border-red-500" value={authEmail} onChange={e=>setAuthEmail(e.target.value)} />
                                <input required type="password" placeholder="Password (Min 6 chars)" className="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:border-red-500" value={authPassword} onChange={e=>setAuthPassword(e.target.value)} />
                                
                                <button disabled={authLoading} className="w-full bg-red-600 text-white py-5 rounded-2xl font-black shadow-lg hover:bg-red-700 mt-4">
                                    {authLoading ? 'Please wait...' : (authIsLogin ? 'Login' : 'Create Reseller Account')}
                                </button>
                            </form>
                            
                            <div className="mt-6 text-center">
                                <button onClick={() => setAuthIsLogin(!authIsLogin)} type="button" className="text-red-600 font-bold text-sm">
                                    {authIsLogin ? "Don't have an account? Sign Up" : "Already a reseller? Login here"}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderNavbar = () => (
                <nav className="glass-panel text-gray-800 sticky top-0 z-50 shadow-sm border-b border-gray-100">
                    <div className="bg-red-600 text-white text-[11px] py-2 px-4 flex justify-between items-center font-medium">
                        <span>Start your Dropshipping Business with Qari Hosiery!</span>
                        <div className="flex gap-3 items-center">
                            <i className="fab fa-whatsapp"></i><i className="fab fa-facebook-f"></i><i className="fab fa-instagram"></i>
                        </div>
                    </div>
                    <div className="p-4 flex justify-between items-center">
                        <button onClick={() => setIsMenuOpen(true)} className="flex items-center gap-2 text-gray-600">
                            <i className="fas fa-bars text-xl"></i>
                        </button>
                        <h1 className="font-bold text-xl select-none text-gray-900 cursor-pointer text-center flex-1" onClick={() => {
                            setView('home'); setSelectedCategory('All'); setSearchQuery(''); setShowCheckout(false);
                            window.history.pushState({}, document.title, window.location.pathname);
                            setSecretClicks(c => { if(c+1 >=3) setView('admin'); return c+1; });
                            setTimeout(()=>setSecretClicks(0), 2000);
                        }}>
                            <span className="text-red-600">New Qari</span> <span className="text-yellow-500">Hosiery</span>
                        </h1>
                        <div className="flex gap-4 items-center">
                            <button onClick={() => user ? auth.signOut() : setShowAuthModal(true)} className="text-gray-600 relative p-2" title={user ? "Logout" : "Login"}>
                                <i className={`fas ${user ? 'fa-sign-out-alt text-red-500' : 'fa-user'}`}></i>
                            </button>
                            <button onClick={() => {setView('cart'); setShowCheckout(false);}} className="relative p-2 text-gray-600">
                                <i className="fas fa-shopping-bag text-2xl"></i>
                                {cart.length > 0 && <span className="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center border-2 border-white">{cart.reduce((a,b)=>a+b.quantity, 0)}</span>}
                            </button>
                        </div>
                    </div>
                </nav>
            );

            const renderSidebar = () => (
                <div className={`fixed inset-0 z-[100] flex ${isMenuOpen ? '' : 'pointer-events-none'}`}>
                    <div className={`fixed inset-0 bg-black/50 transition-opacity duration-300 ${isMenuOpen ? 'opacity-100' : 'opacity-0'}`} onClick={() => setIsMenuOpen(false)}></div>
                    <div className={`relative bg-white w-full max-w-xs h-full flex flex-col animate-sidebar shadow-2xl transition-transform duration-300 ${isMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="p-6 bg-red-600 text-white flex items-center gap-4">
                            <div className="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center text-xl"><i className="fas fa-user"></i></div>
                            <div>
                                <p className="font-bold">{user && resellerProfile ? resellerProfile.name : 'Guest User'}</p>
                                <p className="text-xs opacity-80">{user ? (resellerProfile?.city ? `Reseller - ${resellerProfile.city}` : 'Verified Reseller') : 'Not logged in'}</p>
                            </div>
                        </div>
                        <div className="p-4 border-b">
                            <div className="relative">
                                <input type="text" placeholder="Search products..." className="w-full pl-4 pr-10 py-3 bg-gray-50 rounded-xl border outline-none text-sm" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                                <i className="fas fa-search absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            </div>
                        </div>
                        <div className="flex border-b text-center font-bold text-sm uppercase">
                            <button onClick={() => setActiveTab('Menu')} className={`flex-1 py-4 border-b-2 ${activeTab === 'Menu' ? 'border-red-600 text-red-600' : 'border-transparent text-gray-500'}`}>Menu</button>
                            <button onClick={() => setActiveTab('Categories')} className={`flex-1 py-4 border-b-2 ${activeTab === 'Categories' ? 'border-red-600 text-red-600' : 'border-transparent text-gray-500'}`}>Categories</button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 hide-scrollbar">
                            {activeTab === 'Menu' ? (
                                <div className="space-y-2">
                                    <button className="w-full text-left p-4 rounded-xl hover:bg-red-50 font-medium" onClick={() => {setView('home'); setSelectedCategory('All'); setSearchQuery(''); setIsMenuOpen(false);}}>Home</button>
                                    <button className="w-full text-left p-4 rounded-xl hover:bg-red-50 font-medium" onClick={() => {setView('about'); setIsMenuOpen(false);}}>About Us</button>
                                    <button className="w-full text-left p-4 rounded-xl hover:bg-red-50 font-medium" onClick={() => {setView('contact'); setIsMenuOpen(false);}}>Contact Us</button>
                                    <button className="w-full text-left p-4 rounded-xl hover:bg-red-50 font-medium flex items-center justify-between" onClick={() => {setView('guide'); setIsMenuOpen(false);}}>
                                        <span>Reseller Guide</span> <i className="fas fa-book-open text-red-400"></i>
                                    </button>
                                    {!user && <button className="w-full text-left p-4 rounded-xl bg-red-50 text-red-600 font-black mt-4" onClick={() => {setShowAuthModal(true); setIsMenuOpen(false);}}>Reseller Login</button>}
                                </div>
                            ) : (
                                <div className="space-y-2">
                                    {categories.map(c => (
                                        <button key={c} className={`w-full text-left p-4 rounded-xl font-medium ${selectedCategory === c ? 'bg-red-600 text-white' : 'hover:bg-red-50'}`} onClick={() => {setSelectedCategory(c); setView('home'); setSearchQuery(''); setIsMenuOpen(false);}}>{c}</button>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );

            const renderProductModal = () => {
                if (!selectedProduct) return null;
                const p = selectedProduct;
                const currentPrice = calculatePrice(p, modalQty);
                const isOutOfStock = p.inStock === false;
                const imageList = p.images && p.images.length > 0 ? p.images : [p.image];

                const shareProduct = async () => {
                    const baseUrl = window.location.href.split('?')[0];
                    const shareUrl = `${baseUrl}?p=${p.id}`;
                    const shareText = `🔥 Hot Selling Item!\n\n🛍️ ${p.name}\n💰 Price: Rs. ${p.price}\n📦 Code: ${p.itemCode || p.id.slice(0,4)}\n\n👇 Order online here:\n${shareUrl}`;
                    try {
                        await navigator.clipboard.writeText(shareText);
                        const link = document.createElement('a');
                        link.href = imageList[modalImgIndex];
                        link.download = `Product_${p.itemCode || p.id.slice(0,4)}.jpg`;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        alert("✅ تصویر گیلری میں Save ہو گئی ہے!\n✅ تفصیل Copy ہو گئی ہے!\n\nاب فیس بک یا واٹس ایپ پر پوسٹ کریں۔");
                    } catch (err) {
                        alert("تفصیل کاپی ہو گئی ہے! تصویر پر انگلی دبا کر 'Download Image' کریں۔");
                    }
                };

                const closeModal = () => {
                    setSelectedProduct(null);
                    window.history.pushState({}, document.title, window.location.pathname);
                };

                return (
                    <div className="fixed inset-0 z-[110] flex items-end sm:items-center justify-center bg-black/60 p-0 sm:p-4">
                        <div className="bg-white w-full max-w-lg rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 animate-modal overflow-y-auto max-h-[90vh] hide-scrollbar">
                            <div className="flex justify-between items-start mb-6">
                                <div>
                                    <h2 className="text-2xl font-black text-gray-800">{p.name}</h2>
                                    <span className="bg-gray-100 text-gray-500 px-3 py-1 rounded-full text-[10px] font-black uppercase mt-2 inline-block">Code: {p.itemCode || p.id.slice(0,4)}</span>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={shareProduct} className="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl hover:bg-blue-100 shadow-sm flex items-center gap-2 font-bold text-xs"><i className="fas fa-copy"></i> Copy for FB</button>
                                    <button onClick={closeModal} className="bg-gray-100 text-gray-600 p-2 rounded-full hover:bg-gray-200 shadow-sm w-10 h-10 flex justify-center items-center"><i className="fas fa-times"></i></button>
                                </div>
                            </div>
                            <div className="relative mb-4">
                                <img src={imageList[modalImgIndex]} className={`w-full h-64 object-cover rounded-3xl shadow-sm ${isOutOfStock ? 'opacity-50 grayscale' : ''}`} />
                                {isOutOfStock && <div className="absolute inset-0 flex items-center justify-center"><span className="bg-red-600 text-white px-6 py-2 font-black text-xl transform -rotate-12 rounded-xl border-4 border-white shadow-xl">SOLD OUT</span></div>}
                            </div>
                            {imageList.length > 1 && (
                                <div className="flex gap-2 overflow-x-auto hide-scrollbar mb-6 pb-2">
                                    {imageList.map((img, idx) => <img key={idx} src={img} onClick={() => setModalImgIndex(idx)} className={`w-16 h-16 object-cover rounded-xl cursor-pointer flex-shrink-0 border-2 ${modalImgIndex === idx ? 'border-red-600 scale-105' : 'border-transparent opacity-70'}`} />)}
                                </div>
                            )}
                            <div className="space-y-6">
                                <div><h4 className="text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Description</h4><p className="text-gray-600 text-sm whitespace-pre-wrap">{p.description || "Premium quality product."}</p></div>
                                <div className="grid grid-cols-2 gap-6">
                                    <div><h4 className="text-xs font-black text-gray-400 uppercase mb-2">Sizes</h4><p className="font-bold text-red-600">{p.sizes || "Standard"}</p></div>
                                    <div><h4 className="text-xs font-black text-gray-400 uppercase mb-2">Colors</h4><p className="font-bold text-red-600">{p.colors || "Mixed"}</p></div>
                                </div>
                                {p.bulkQty && (
                                    <div className="bg-red-50 p-4 rounded-2xl border border-red-100"><p className="text-xs font-bold text-red-700">🔥 WHOLESALE OFFER:</p><p className="text-sm font-medium">Buy {p.bulkQty} {p.unit} or more for <span className="font-black text-red-800">Rs. {p.bulkPrice}</span> / {p.unit}</p></div>
                                )}
                                {!isOutOfStock && (
                                    <div className="flex items-center justify-between pt-4 border-t">
                                        <div className="flex items-center gap-4 bg-gray-100 p-2 rounded-2xl">
                                            <button onClick={() => setModalQty(Math.max(1, modalQty - 1))} className="w-10 h-10 bg-white rounded-xl shadow-sm">-</button>
                                            <span className="font-black w-8 text-center text-lg">{modalQty}</span>
                                            <button onClick={() => setModalQty(modalQty + 1)} className="w-10 h-10 bg-white rounded-xl shadow-sm">+</button>
                                        </div>
                                        <div className="text-right"><p className="text-xs text-gray-400 font-bold uppercase">Wholesale Price</p><p className="text-2xl font-black text-red-600">Rs. {currentPrice * modalQty}</p></div>
                                    </div>
                                )}
                                <button disabled={isOutOfStock} onClick={() => {
                                    setCart(prev => {
                                        const ex = prev.find(i => i.id === p.id);
                                        if(ex) return prev.map(i => i.id === p.id ? {...i, quantity: i.quantity + modalQty} : i);
                                        return [...prev, { ...p, quantity: modalQty, finalPrice: currentPrice }];
                                    });
                                    closeModal();
                                    if(typeof fbq !== 'undefined') fbq('track', 'AddToCart', {content_name: p.name, value: currentPrice * modalQty});
                                }} className={`w-full py-5 rounded-3xl font-black text-lg ${isOutOfStock ? 'bg-gray-300 text-gray-500' : 'bg-red-600 text-white shadow-xl hover:bg-red-700'}`}>
                                    {isOutOfStock ? 'Currently Unavailable' : 'Add to Cart'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderProductCard = (p) => {
                const isOutOfStock = p.inStock === false;
                const displayImg = p.images && p.images.length > 0 ? p.images[0] : p.image;
                return (
                    <div key={p.id} onClick={() => { 
                        if (!isOutOfStock) { 
                            setSelectedProduct(p); 
                            setModalQty(1);
                            setModalImgIndex(0);
                            window.history.pushState({}, document.title, `?p=${p.id}`); 
                        } 
                    }} className={`bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden flex flex-col group relative cursor-pointer ${isOutOfStock ? 'opacity-70 grayscale' : 'hover:shadow-xl transition-all'}`}>
                        <div className="absolute top-3 left-3 bg-white/90 px-2 py-1 rounded-lg text-[10px] font-black z-10 border shadow-sm">Code: {p.itemCode || p.id.slice(0,4)}</div>
                        <div className="absolute top-3 right-3 bg-red-600 text-white px-3 py-1.5 rounded-full text-[10px] font-black z-10 flex items-center gap-1 shadow-md"><i className="fas fa-fire text-[9px]"></i> {p.fakeSold || "500+"} Sold</div>
                        {isOutOfStock && <div className="absolute inset-0 bg-white/50 z-20 flex items-center justify-center"><span className="bg-red-600 text-white font-black px-6 py-2 text-xl rounded-xl transform -rotate-12 border-4 border-white shadow-xl">SOLD OUT</span></div>}
                        <img src={displayImg} className="w-full h-48 object-cover" />
                        <div className="p-5 flex-1 flex flex-col">
                            <h3 className="font-bold text-gray-900 mb-1 line-clamp-1">{p.name}</h3>

                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex gap-6 items-start"><div className="bg-yellow-50 w-14 h-14 rounded-2xl flex items-center justify-center shrink-0 text-yellow-600 text-2xl font-black">3</div><div><h3 className="text-xl font-bold text-gray-900 mb-2">Place Order & Set Profit</h3><p className="text-gray-600 leading-relaxed text-sm">When you get an order from your customer, add the item to your cart here. Proceed to checkout, enter your Customer's Address, and your <span className="font-bold text-emerald-600">Profit Margin</span>.</p></div></div>
                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex gap-6 items-start"><div className="bg-purple-50 w-14 h-14 rounded-2xl flex items-center justify-center shrink-0 text-purple-600 text-2xl font-black">4</div><div><h3 className="text-xl font-bold text-gray-900 mb-2">White-Label Delivery</h3><p className="text-gray-600 leading-relaxed text-sm">We will securely pack and deliver the parcel directly to your customer. The parcel will have <span className="font-bold text-gray-900">Your Store Name</span> on it, not ours!</p></div></div>
                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex gap-6 items-start"><div className="bg-emerald-50 w-14 h-14 rounded-2xl flex items-center justify-center shrink-0 text-emerald-600 text-2xl font-black">5</div><div><h3 className="text-xl font-bold text-gray-900 mb-2">Get Paid</h3><p className="text-gray-600 leading-relaxed text-sm">Once the customer receives the parcel and pays the COD amount, your profit will be transferred to your <span className="font-bold text-emerald-600">Easypaisa or JazzCash</span> account.</p></div></div>
                    </div>
                    <div className="pt-10 text-center"><button onClick={() => {setView('home');}} className="px-8 py-4 bg-red-600 text-white font-bold rounded-full text-sm uppercase tracking-widest shadow-lg hover:bg-red-700 transition-colors w-full sm:w-auto">Start Selling Now</button></div>
                </div>
            );

            return (
                <div className="min-h-screen pb-20">
                    {renderNavbar()}
                    {renderSidebar()}
                    {view === 'home' && renderHome()}
                    {view === 'about' && renderAboutView()}
                    {view === 'contact' && renderContactView()}
                    {view === 'admin' && renderAdminPanel()}
                    {view === 'cart' && renderCartAndCheckout()}
                    {view === 'guide' && renderGuideView()}
                    {renderProductModal()}
                    {renderAuthModal()}
                    <a href="https://wa.me/923065378112" target="_blank" className="fixed bottom-6 right-6 z-40 bg-emerald-500 text-white w-16 h-16 rounded-full flex items-center justify-center text-3xl shadow-2xl border-4 border-white hover:scale-110 transition-transform"><i className="fab fa-whatsapp"></i></a>

        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
