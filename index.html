<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Qari Hosiery Store | Faisalabad Wholesale</title>
    
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');

      fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=395432518120120&ev=PageView&noscript=1"
    /></noscript>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes slideInFromLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        .animate-sidebar { animation: slideInFromLeft 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const firebaseConfig = {
            apiKey: "AIzaSyCxr3iEVkcaqKyP7Mcmb1eZafcPGLOJUB0",
            authDomain: "numan-8e439.firebaseapp.com",
            projectId: "numan-8e439",
            storageBucket: "numan-8e439.firebasestorage.app",
            messagingSenderId: "791551549061",
            appId: "1:791551549061:web:757340191fd3e6425d53ec"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // Final Categories List
        const categories = ['All', 'Socks', 'Vests', 'Caps', 'Trousers', 'Undergarments', 'Accessories'];

        function App() {
            const [view, setView] = useState('home');
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [secretClicks, setSecretClicks] = useState(0);
            const [isLoading, setIsLoading] = useState(true);
            const [isAdmin, setIsAdmin] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [activeTab, setActiveTab] = useState('Menu');

            useEffect(() => {
                const unsubscribe = db.collection("products").onSnapshot(snap => {
                    const fetchedProducts = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                    setProducts(fetchedProducts);
                    setIsLoading(false);
                    console.log("Fetched Products Count:", fetchedProducts.length); // debugging
                });
                return () => unsubscribe();
            }, []);

            const Navbar = () => (
                <nav className="bg-white text-gray-800 sticky top-0 z-50 shadow-sm border-b border-gray-100">
                    {/* Red Promo Bar */}
                    <div className="bg-red-600 text-white text-[11px] py-2 px-4 flex justify-between items-center font-medium">
                        <span>Welcome to Qari Hosiery | Wholesale Faisalabad market rates</span>
                        <div className="flex gap-3 items-center">
                            <i className="fab fa-whatsapp"></i>
                            <i className="fab fa-facebook-f"></i>
                            <i className="fab fa-instagram"></i>
                        </div>
                    </div>
                    {/* Main Header */}
                    <div className="p-4 flex justify-between items-center">
                        <button onClick={() => setIsMenuOpen(true)} className="flex items-center gap-2 text-gray-600 hover:text-red-600 transition-colors">
                            <i className="fas fa-bars text-xl"></i>
                            <span className="font-bold text-sm uppercase tracking-wider hidden sm:inline">Menu</span>
                        </button>
                        <h1 className="font-bold text-xl select-none text-gray-900 cursor-pointer" onClick={() => {
                            setSecretClicks(c => { if(c+1 >=3) setView('admin'); return c+1; });
                            setTimeout(()=>setSecretClicks(0), 2000);
                        }}>
                            <span className="text-red-600">New Qari</span> <span className="text-yellow-500">Hosiery</span>
                        </h1>
                        <button onClick={() => setView('cart')} className="relative p-2 text-gray-600 hover:text-red-600 transition-colors">
                            <i className="fas fa-shopping-bag text-2xl"></i>
                            <span className="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center border-2 border-white">{cart.reduce((a,b)=>a+b.quantity, 0)}</span>
                        </button>
                    </div>
                </nav>
            );

            const Sidebar = () => (
                <div className={`fixed inset-0 z-[100] flex ${isMenuOpen ? '' : 'pointer-events-none'}`}>
                    <div className={`fixed inset-0 bg-black/50 transition-opacity duration-300 ${isMenuOpen ? 'opacity-100' : 'opacity-0'}`} onClick={() => setIsMenuOpen(false)}></div>
                    <div className={`relative bg-white w-full max-w-xs h-full flex flex-col animate-sidebar shadow-2xl transition-transform duration-300 ${isMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        {/* Search Bar */}
                        <div className="p-4 border-b">
                            <div className="relative">
                                <input type="text" placeholder="Search for products..." className="w-full pl-4 pr-10 py-3 bg-gray-50 rounded-xl border border-gray-100 outline-none focus:border-red-300 text-sm" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                                <i className="fas fa-search absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            </div>
                        </div>
                        {/* Tabs */}
                        <div className="flex border-b text-center font-bold text-sm uppercase tracking-wider">
                            <button onClick={() => setActiveTab('Menu')} className={`flex-1 py-4 border-b-2 ${activeTab === 'Menu' ? 'border-red-600 text-red-600' : 'border-transparent text-gray-500'}`}>Menu</button>
                            <button onClick={() => setActiveTab('Categories')} className={`flex-1 py-4 border-b-2 ${activeTab === 'Categories' ? 'border-red-600 text-red-600' : 'border-transparent text-gray-500'}`}>Categories</button>
                        </div>
                        {/* Tab Content */}
                        <div className="flex-1 overflow-y-auto p-4 space-y-2 text-gray-700">
                            {activeTab === 'Menu' && (
                                <>
                                    <button className="w-full text-left p-4 rounded-xl hover:bg-red-50 font-medium" onClick={() => {setView('home'); setIsMenuOpen(false);}}>Home</button>
                                    <button className="w-full text-left p-4 rounded-xl hover:bg-red-50 font-medium" onClick={() => {setView('about'); setIsMenuOpen(false);}}>About Us</button>
                                    <button className="w-full text-left p-4 rounded-xl hover:bg-red-50 font-medium" onClick={() => {setView('contact'); setIsMenuOpen(false);}}>Contact Us</button>
                                </>
                            )}
                            {activeTab === 'Categories' && (
                                categories.map(c => (
                                    <button key={c} className={`w-full text-left p-4 rounded-xl font-medium ${selectedCategory === c ? 'bg-red-600 text-white' : 'hover:bg-red-50'}`} onClick={() => {setSelectedCategory(c); setView('home'); setIsMenuOpen(false); setSearchQuery('');}}>{c}</button>
                                ))
                            )}
                        </div>
                        {/* Close Button */}
                        <button onClick={() => setIsMenuOpen(false)} className="p-6 text-gray-400 text-sm font-bold border-t">Close Menu</button>
                    </div>
                </div>
            );

            const Home = () => {
                const filteredProducts = products.filter(p => 
                    (selectedCategory === 'All' || p.category === selectedCategory) &&
                    (p.name.toLowerCase().includes(searchQuery.toLowerCase()))
                );

                return (
                    <div>
                        {/* Hero Banner */}
                        <div className="relative h-64 bg-gray-900 flex items-center justify-center text-center px-6">
                            <div className="absolute inset-0 opacity-30 bg-[url('https://images.unsplash.com/photo-1603251493015-844a4e8d3809?q=80&w=1000')] bg-cover bg-center"></div>
                            <div className="relative z-10 text-white">
                                <h2 className="text-4xl font-black mb-1 uppercase tracking-tighter">hosiery</h2>
                                <p className="text-sm font-medium opacity-80">Premium quality wholesale specialist from Faisalabad</p>
                                <button className="mt-6 px-6 py-3 bg-red-600 text-white font-bold rounded-full text-xs uppercase tracking-widest flex items-center gap-2 mx-auto">Categories <i className="fas fa-chevron-down text-[10px]"></i></button>
                            </div>
                        </div>

                        {/* Product Grid */}
                        <div className="p-4 grid grid-cols-2 md:grid-cols-4 gap-4 max-w-7xl mx-auto py-10">
                            {isLoading ? <p className="col-span-full text-center py-20 font-medium opacity-50 italic">Loading Collection...</p> : 
                             filteredProducts.length === 0 ? <p className="col-span-full text-center py-20 font-medium opacity-50 italic">No products found.</p> :
                             filteredProducts.map(p => {
                                const isOutOfStock = p.inStock === false;
                                // Generate a random 'Sold' number if none exists
                                const soldQty = p.fakeSold || (Math.floor(200 + Math.random() * 800) + "+");
                                return (
                                <div key={p.id} onClick={() => !isOutOfStock && {}} className={`bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden flex flex-col group relative ${isOutOfStock ? 'opacity-70 grayscale' : ''}`}>
                                    {/* Code Badge */}
                                    <div className="absolute top-3 left-3 bg-white/90 backdrop-blur-sm px-2 py-1 rounded-lg text-[10px] font-black text-gray-900 z-10 border shadow-sm">Code: {p.itemCode || p.id.slice(0,4)}</div>
                                    
                                    {/* Sold Badge */}
                                    <div className="absolute top-3 right-3 bg-red-600 text-white px-3 py-1.5 rounded-full text-[10px] font-black z-10 flex items-center gap-1 shadow-md">
                                        <i className="fas fa-fire text-[9px]"></i> {soldQty} Sold
                                    </div>
                                    
                                    {/* Out of Stock Overlay */}
                                    {isOutOfStock && (
                                        <div className="absolute inset-0 bg-white/50 z-20 flex items-center justify-center pointer-events-none">
                                            <span className="bg-red-600 text-white font-black px-6 py-2 text-xl rounded-xl transform -rotate-12 border-4 border-white shadow-xl">SOLD OUT</span>
                                        </div>
                                    )}

                                    <img src={p.image} className="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-300" />
                                    <div className="p-5 flex-1 flex flex-col">
                                        <h3 className="font-bold text-gray-900 mb-1 line-clamp-1">{p.name}</h3>
                                        <div className="flex items-baseline gap-1 mb-3">
                                            <p className="text-red-600 font-black text-xl">Rs. {p.price}</p>
                                            <span className="text-[10px] text-gray-400 font-bold tracking-wider uppercase">/ {p.unit}</span>
                                        </div>
                                        <button disabled={isOutOfStock} onClick={(e) => {
                                            e.stopPropagation(); // prevent modal
                                            setCart(prev => {
                                                const ex = prev.find(i => i.id === p.id);
                                                if(ex) return prev.map(i => i.id === p.id ? {...i, quantity: i.quantity + 1} : i);
                                                return [...prev, {...p, quantity: 1, finalPrice: p.price}]; // simple cart add
                                            });
                                            if(typeof fbq !== 'undefined') fbq('track', 'AddToCart', {content_name: p.name, value: p.price, currency: 'PKR'});
                                        }} className={`mt-auto w-full py-3 rounded-2xl text-xs font-black shadow ${isOutOfStock ? 'bg-gray-200 text-gray-500 cursor-not-allowed' : 'bg-red-600 text-white hover:bg-red-700'}`}>
                                            {isOutOfStock ? 'Out of Stock' : 'Add to Cart'}
                                        </button>
                                    </div>
                                </div>
                            )})}
                        </div>
                    </div>
                );
            };

            const AdminPanel = () => {
                const [pForm, setPForm] = useState({ name: '', itemCode: '', price: '', unit: '', category: 'Socks', description: '', sizes: '', colors: '', bulkQty: '', bulkPrice: '', inStock: true, fakeSold: '' });
                const [editId, setEditId] = useState(null);
                const [imgFile, setImgFile] = useState(null);
                const [isSaving, setIsSaving] = useState(false);

                const saveProduct = async (e) => {
                    e.preventDefault();
                    setIsSaving(true);
                    try {
                        let imgUrl = editId ? products.find(p => p.id === editId).image : "";
                        if (imgFile) {
                            const reader = new FileReader();
                            reader.readAsDataURL(imgFile);
                            imgUrl = await new Promise(res => {
                                reader.onload = (ev) => {
                                    const img = new Image();
                                    img.src = ev.target.result;
                                    img.onload = () => {
                                        const canvas = document.createElement('canvas');
                                        canvas.width = 600; canvas.height = 600; // Resize
                                        canvas.getContext('2d').drawImage(img, 0, 0, 600, 600);
                                        res(canvas.toDataURL('image/jpeg', 0.7)); // Compress
                                    }
                                }
                            });
                        }
                        const finalCode = pForm.itemCode || Math.floor(1000 + Math.random() * 9000).toString();
                        const finalData = { 
                            ...pForm, 
                            itemCode: finalCode,
                            price: Number(pForm.price), 
                            bulkQty: pForm.bulkQty ? Number(pForm.bulkQty) : null,
                            bulkPrice: pForm.bulkPrice ? Number(pForm.bulkPrice) : null,
                            inStock: pForm.inStock,
                            image: imgUrl 
                        };
                        if (editId) await db.collection("products").doc(editId).update(finalData);
                        else await db.collection("products").add(finalData);
                        alert("Product Saved!");
                        setEditId(null); setPForm({ name: '', itemCode: '', price: '', unit: '', category: 'Socks', description: '', sizes: '', colors: '', bulkQty: '', bulkPrice: '', inStock: true, fakeSold: '' });
                    } catch (err) { alert("Error saving product"); }
                    setIsSaving(false);
                };

                const editProduct = (p) => {
                    setEditId(p.id);
                    setPForm({...p, price: p.price.toString(), bulkQty: p.bulkQty?.toString() || '', bulkPrice: p.bulkPrice?.toString() || '', inStock: p.inStock !== false});
                    window.scrollTo(0,0);
                };

                                if(!isAdmin) return (
                    <div className="p-10 text-center flex flex-col items-center mt-10">
                        <i className="fas fa-lock text-5xl text-gray-200 mb-6"></i>
                        <h2 className="text-2xl font-bold mb-8 text-gray-800">Admin Login</h2>
                        <input type="password" placeholder="Enter Secret PIN" className="border-2 p-4 rounded-2xl w-full max-w-xs text-center text-2xl outline-none focus:border-red-500 shadow-sm tracking-widest" onChange={e => e.target.value === '7860' && setIsAdmin(true)} />
                    </div>
                );

                );

                return (
                    <div className="p-6 max-w-2xl mx-auto space-y-8 py-10">
                        <div className="flex justify-between items-center">
                            <h2 className="text-2xl font-black text-gray-900">{editId ? "Edit Product" : "Add New Product"}</h2>
                            <button onClick={()=>setIsAdmin(false)} className="text-red-600 font-bold text-sm bg-red-50 px-4 py-2 rounded-xl">Logout</button>
                        </div>
                        <form className="space-y-6 bg-white p-8 rounded-3xl shadow-lg border border-gray-100" onSubmit={saveProduct}>
                            <input required placeholder="Product Name" className="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:border-red-500" value={pForm.name} onChange={e=>setPForm({...pForm, name:e.target.value})} />
                            <div className="grid grid-cols-2 gap-4">
                                <input placeholder="Item Code (e.g. A-101)" className="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:border-red-500" value={pForm.itemCode} onChange={e=>setPForm({...pForm, itemCode:e.target.value})} />
                                <input placeholder="Fake Sold Count (e.g. 500+)" className="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:border-red-500" value={pForm.fakeSold} onChange={e=>setPForm({...pForm, fakeSold:e.target.value})} />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <input required type="number" placeholder="Regular Price" className="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:border-red-500" value={pForm.price} onChange={e=>setPForm({...pForm, price:e.target.value})} />
                                <input required placeholder="Unit (e.g. Dozen)" className="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:border-red-500" value={pForm.unit} onChange={e=>setPForm({...pForm, unit:e.target.value})} />
                            </div>
                            <select className="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:border-red-500 font-bold text-gray-700" value={pForm.category} onChange={e=>setPForm({...pForm, category:e.target.value})}>
                                {categories.filter(c=>c!=='All').map(c=><option key={c} value={c}>{c}</option>)}
                            </select>
                            <label className="flex items-center gap-3 cursor-pointer p-2 bg-gray-50 rounded-xl">
                                <input type="checkbox" checked={pForm.inStock} onChange={e=>setPForm({...pForm, inStock: e.target.checked})} className="w-6 h-6 accent-red-600 rounded" />
                                <span className={`font-bold ${pForm.inStock ? 'text-gray-700' : 'text-red-600'}`}>{pForm.inStock ? "Item In Stock" : "Mark as Out of Stock"}</span>
                            </label>
                            <input type="file" className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-red-50 file:text-red-700" onChange={e=>setImgFile(e.target.files[0])} />
                            <button disabled={isSaving} className="w-full bg-red-600 text-white py-5 rounded-2xl font-black shadow-lg hover:bg-red-700">
                                {isSaving ? "Saving..." : (editId ? "Update Product" : "Save Product")}
                            </button>
                            {editId && <button type="button" onClick={()=>{setEditId(null); setPForm({name:'',itemCode:'',price:'',unit:'',category:'Socks',description:'',sizes:'',colors:'',bulkQty:'',bulkPrice:'',inStock:true,fakeSold:''});}} className="w-full text-gray-400 font-bold text-sm">Cancel Edit</button>}
                        </form>
                        
                        <div className="space-y-3 pt-10">
                            <h3 className="font-bold text-gray-400 text-xs uppercase px-2">Inventory List ({products.length})</h3>
                            {products.map(p => (
                                <div key={p.id} className={`bg-white p-4 rounded-2xl flex items-center justify-between border shadow-sm ${p.inStock===false?'opacity-60':''}`}>
                                    <div className="flex items-center gap-4">
                                        <img src={p.image} className="w-12 h-12 rounded-xl object-cover" />
                                        <div>
                                            <p className="font-bold text-sm text-gray-800">{p.name} {p.inStock===false && <span className="text-[10px] text-red-500 font-black ml-1">(OUT)</span>}</p>
                                            <p className="text-[10px] bg-gray-100 px-2 py-0.5 rounded text-gray-500 font-bold inline-block mr-2">Code: {p.itemCode || p.id.slice(0,4)}</p>
                                            <span className="text-xs font-bold text-red-600">Rs. {p.price} / {p.unit}</span>
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={()=>editProduct(p)} className="text-blue-500 p-2 bg-blue-50 rounded-full w-10 h-10 flex items-center justify-center"><i className="fas fa-edit"></i></button>
                                        <button onClick={() => confirm("Delete this product?") && db.collection("products").doc(p.id).delete()} className="text-red-400 p-2 bg-red-50 rounded-full w-10 h-10 flex items-center justify-center"><i className="fas fa-trash-alt"></i></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const AboutView = () => (
                <div className="p-8 max-w-3xl mx-auto py-20 text-center space-y-6">
                    <i className="fas fa-info-circle text-5xl text-red-100"></i>
                    <h2 className="text-4xl font-black text-gray-900 tracking-tighter">About New Qari Hosiery</h2>
                    <p className="text-gray-600 leading-relaxed">We are Faisalabad's leading wholesale specialists, providing premium quality hosiery products including socks, vests, caps, and trousers at market-competitive rates. With years of experience, we serve retailers across Pakistan with reliable delivery and top-notch customer service.</p>
                    <button onClick={() => setView('home')} className="mt-6 px-6 py-3 bg-red-600 text-white font-bold rounded-full text-xs uppercase tracking-widest">Back to Shop</button>
                </div>
            );

            const ContactView = () => (
                <div className="p-8 max-w-3xl mx-auto py-20 text-center space-y-6">
                    <i className="fas fa-phone-alt text-5xl text-red-100"></i>
                    <h2 className="text-4xl font-black text-gray-900 tracking-tighter">Contact Us</h2>
                    <p className="text-gray-600">Have questions? Want to place a bulk order? We are here to help!</p>
                    <div className="bg-white p-8 rounded-3xl shadow-lg border inline-block text-left space-y-4">
                        <p className="font-bold flex items-center gap-3"><i className="fab fa-whatsapp text-emerald-500 text-xl"></i> +92 306 5378112</p>
                        <p className="font-bold flex items-center gap-3"><i className="fas fa-map-marker-alt text-red-500 text-xl"></i> Wholesale Hosiery Market, Faisalabad</p>
                    </div>
                    <div className="pt-10">
                        <button onClick={() => setView('home')} className="px-6 py-3 bg-red-600 text-white font-bold rounded-full text-xs uppercase tracking-widest">Back to Shop</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    <Navbar />
                    <Sidebar />
                    {view === 'home' && <Home />}
                    {view === 'admin' && <AdminPanel />}
                    {view === 'about' && <AboutView />}
                    {view === 'contact' && <ContactView />}
                    {view === 'cart' && (
                        <div className="p-8 max-w-3xl mx-auto py-12 space-y-10">
                            <h2 className="text-4xl font-black mb-10 text-gray-900 tracking-tighter">My Cart</h2>
                            {cart.length === 0 ? (
                                <div className="text-center py-20 text-gray-300 font-bold space-y-4">
                                    <i className="fas fa-shopping-bag text-6xl"></i>
                                    <p className="text-2xl">Your bag is empty.</p>
                                    <button onClick={() => setView('home')} className="mt-6 px-6 py-3 bg-red-600 text-white font-bold rounded-full text-xs uppercase tracking-widest">Start Shopping</button>
                                </div>
                            ) : (
                                <div className="space-y-6">
                                    {cart.map((item, idx) => (
                                        <div key={idx} className="bg-white p-6 rounded-3xl border flex items-center gap-6 shadow-sm relative">
                                            <div className="absolute top-3 left-3 bg-white/90 backdrop-blur-sm px-2 py-1 rounded-lg text-[10px] font-black text-gray-900 z-10 border shadow-sm">Code: {item.itemCode || item.id.slice(0,4)}</div>
                                            <img src={item.image} className="w-20 h-20 rounded-2xl object-cover" />
                                            <div className="flex-1">
                                                <p className="font-bold text-lg text-gray-800">{item.name}</p>
                                                <p className="text-red-600 font-bold">Rs. {item.finalPrice} x {item.quantity} {item.unit}</p>
                                            </div>
                                            <button onClick={() => setCart(prev => prev.filter((_, i) => i !== idx))} className="text-red-300 text-xl p-2 bg-red-50 rounded-full w-10 h-10 flex items-center justify-center"><i className="fas fa-trash"></i></button>
                                        </div>
                                    ))}
                                    <div className="bg-gray-900 text-white p-10 rounded-[2.5rem] shadow-2xl mt-12 space-y-8">
                                        <div className="flex justify-between text-3xl font-black tracking-tight"><span>Total Bill</span><span>Rs. {cart.reduce((a,b)=>a+(b.finalPrice*b.quantity), 0)}</span></div>
                                        <button className="w-full bg-red-600 text-white py-6 rounded-2xl font-black text-xl shadow-lg hover:bg-red-700 active:scale-95 transition-transform" onClick={() => {
                                            const total = cart.reduce((a,b)=>a+(b.finalPrice*b.quantity), 0);
                                            const msg = `*New Wholesale Order from Qari Hosiery*%0A%0A*Items:*%0A${cart.map(i => `- [Code: ${i.itemCode || i.id.slice(0,4)}] ${i.name} (Rs. ${i.finalPrice}) x${i.quantity} ${i.unit}`).join('%0A')}%0A%0A*Grand Total:* Rs. ${total}`;
                                            if(typeof fbq !== 'undefined') fbq('track', 'Purchase', {value: total, currency: 'PKR'});
                                            window.open(`https://wa.me/923065378112?text=${msg}`);
                                            setCart([]); setView('home');
                                        }}>Send Order via WhatsApp <i className="fab fa-whatsapp ml-2"></i></button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                    
                    {/* Floating WhatsApp Button */}
                    <a href="https://wa.me/923065378112" target="_blank" className="fixed bottom-6 right-6 z-40 bg-emerald-500 text-white w-16 h-16 rounded-full flex items-center justify-center text-3xl shadow-2xl hover:bg-emerald-600 transition-colors">
                        <i className="fab fa-whatsapp"></i>
                    </a>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
