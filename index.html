<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Qari Hosiery Store</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; scroll-behavior: smooth; }
        .animate-slide-in-left { animation: slideInLeft 0.3s ease-out forwards; }
        @keyframes slideInLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }
    </style>
</head>
<body class="bg-gray-50 font-sans text-left">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCxr3iEVkcaqKyP7Mcmb1eZafcPGLOJUB0",
            authDomain: "numan-8e439.firebaseapp.com",
            projectId: "numan-8e439",
            storageBucket: "numan-8e439.firebasestorage.app",
            messagingSenderId: "791551549061",
            appId: "1:791551549061:web:757340191fd3e6425d53ec"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const DELIVERY_CHARGE = 250; 
        const categories = ['All', 'Vests', 'Caps', 'Trousers', 'Undergarments', 'Accessories'];

        function App() {
            const [view, setView] = useState('home'); 
            const [products, setProducts] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [cart, setCart] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [toastMessage, setToastMessage] = useState(null);
            
            const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);
            const [secretClicks, setSecretClicks] = useState(0);
            const [selectedProduct, setSelectedProduct] = useState(null);

            const fetchProducts = async () => {
                setIsLoading(true);
                try {
                    const querySnapshot = await db.collection("products").get();
                    setProducts(querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                } catch (error) { showToast("Failed to connect to database."); }
                setIsLoading(false);
            };

            useEffect(() => { fetchProducts(); }, []);

            const showToast = (message) => {
                setToastMessage(message);
                setTimeout(() => setToastMessage(null), 3000);
            };

            const formatPrice = (price) => new Intl.NumberFormat('en-PK', { style: 'currency', currency: 'PKR', maximumFractionDigits: 0 }).format(price);
            const formatDate = (dateString) => new Date(dateString).toLocaleString('en-PK');

            const handleSecretDoor = () => {
                const newClicks = secretClicks + 1;
                setSecretClicks(newClicks);
                if (newClicks >= 3) { setView('admin'); setSecretClicks(0); setIsMobileMenuOpen(false); }
                setTimeout(() => setSecretClicks(0), 2000); 
            };

            const addToCart = (product) => {
                setCart((prevCart) => {
                    const existingItem = prevCart.find((item) => item.id === product.id);
                    if (existingItem) return prevCart.map((item) => item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item);
                    return [...prevCart, { ...product, quantity: 1 }];
                });
                showToast(product.name + " added to cart!");
            };

            const Navbar = () => (
                <nav className="bg-emerald-800 text-white shadow-lg sticky top-0 z-40">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between h-16 items-center">
                            <div className="flex items-center">
                                <button onClick={() => setIsMobileMenuOpen(true)} className="p-2 mr-2 rounded-md hover:bg-emerald-700 focus:outline-none">
                                    <i className="fas fa-bars text-2xl"></i>
                                </button>
                                <div className="flex-shrink-0 flex items-center cursor-pointer select-none" onClick={handleSecretDoor}>
                                    <span className="font-extrabold text-xl tracking-tight">Qari Hosiery</span>
                                </div>
                            </div>
                            
                            <div className="flex items-center">
                                <button onClick={() => setView('cart')} className="relative p-2 rounded-full hover:bg-emerald-700">
                                    <i className="fas fa-shopping-cart text-2xl text-emerald-100"></i>
                                    {cart.length > 0 && <span className="absolute top-0 right-0 inline-flex items-center justify-center px-2 py-1 text-xs font-bold text-white transform translate-x-1/4 -translate-y-1/4 bg-red-500 rounded-full border-2 border-emerald-800">{cart.reduce((a,b)=>a+b.quantity,0)}</span>}
                                </button>
                            </div>
                        </div>
                    </div>
                </nav>
            );

            const MobileMenu = () => {
                if (!isMobileMenuOpen) return null;
                return (
                    <div className="fixed inset-0 z-[100] flex">
                        <div className="fixed inset-0 bg-black/60 transition-opacity" onClick={() => setIsMobileMenuOpen(false)}></div>
                        
                        <div className="relative w-72 max-w-sm bg-white h-full shadow-2xl flex flex-col transform transition-transform animate-slide-in-left">
                            <div className="bg-emerald-800 p-6 flex justify-between items-center text-white">
                                <h2 className="text-xl font-bold">Menu</h2>
                                <button onClick={() => setIsMobileMenuOpen(false)} className="w-8 h-8 flex items-center justify-center rounded-full bg-emerald-700 hover:bg-emerald-600"><i className="fas fa-times"></i></button>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-4 flex flex-col space-y-2">
                                <button onClick={() => { setView('home'); setIsMobileMenuOpen(false); }} className={`flex items-center w-full text-left p-3 rounded-lg font-bold transition-colors ${view === 'home' ? 'bg-emerald-50 text-emerald-800' : 'text-gray-700 hover:bg-gray-100'}`}>
                                    <i className="fas fa-home w-6 text-center mr-2"></i> Home
                                </button>
                                
                                <button onClick={() => { setView('about'); setIsMobileMenuOpen(false); }} className={`flex items-center w-full text-left p-3 rounded-lg font-bold transition-colors ${view === 'about' ? 'bg-emerald-50 text-emerald-800' : 'text-gray-700 hover:bg-gray-100'}`}>
                                    <i className="fas fa-info-circle w-6 text-center mr-2"></i> About Us
                                </button>

                                <div className="border-t border-gray-200 my-2 pt-4">
                                    <p className="text-xs font-extrabold text-gray-400 mb-3 px-3 uppercase tracking-wider">Categories</p>
                                    <div className="space-y-1">
                                        {categories.map(cat => (
                                            <button 
                                                key={cat} 
                                                onClick={() => { setSelectedCategory(cat); setView('home'); setIsMobileMenuOpen(false); }} 
                                                className={`w-full text-left p-3 rounded-lg flex items-center transition-colors ${selectedCategory === cat && view === 'home' ? 'bg-emerald-600 text-white font-bold shadow-md' : 'text-gray-600 hover:bg-emerald-50'}`}
                                            >
                                                <div className={`w-2 h-2 rounded-full mr-3 ${selectedCategory === cat && view === 'home' ? 'bg-white' : 'bg-gray-300'}`}></div>
                                                {cat}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            
                            <div className="p-4 bg-gray-50 border-t border-gray-200">
                                <a href="https://wa.me/923065378112" target="_blank" className="flex items-center justify-center w-full bg-green-500 hover:bg-green-600 text-white p-3 rounded-lg font-bold transition-colors">
                                    <i className="fab fa-whatsapp text-xl mr-2"></i> Contact on WhatsApp
                                </a>
                            </div>
                        </div>
                    </div>
                );
            };

            const AdminView = () => {
                const [activeTab, setActiveTab] = useState('orders'); 
                const [editingProduct, setEditingProduct] = useState(null);
                const [productForm, setProductForm] = useState({ name: '', price: '', category: 'Vests', image: '', description: '' });
                const [imageFile, setImageFile] = useState(null); 
                const [orders, setOrders] = useState([]);
                const [isLoadingOrders, setIsLoadingOrders] = useState(false);
                const [pinInput, setPinInput] = useState('');
                const [isSaving, setIsSaving] = useState(false);

                const fetchOrders = async () => {
                    setIsLoadingOrders(true);
                    try {
                        const snapshot = await db.collection("orders").get();
                        setOrders(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b)=>new Date(b.date)-new Date(a.date)));
                    } catch (error) { showToast("Failed to load orders."); }
                    setIsLoadingOrders(false);
                };

                useEffect(() => { if (activeTab === 'orders' && isAdminLoggedIn) fetchOrders(); }, [activeTab, isAdminLoggedIn]);

                const handleLogin = (e) => {
                    e.preventDefault();
                    if (pinInput === '7860') { setIsAdminLoggedIn(true); showToast("Welcome Admin!"); }
                    else { showToast("Incorrect Password!"); setPinInput(''); }
                };

                const compressImage = (file) => {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.readAsDataURL(file);
                        reader.onload = (event) => {
                            const img = new Image();
                            img.src = event.target.result;
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                const MAX_WIDTH = 600;
                                const MAX_HEIGHT = 600;
                                let width = img.width;
                                let height = img.height;

                                if (width > height) {
                                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                                } else {
                                    if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                                }
                                canvas.width = width;
                                canvas.height = height;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, 0, 0, width, height);
                                resolve(canvas.toDataURL('image/jpeg', 0.6)); 
                            };
                            img.onerror = (err) => reject(err);
                        };
                        reader.onerror = (err) => reject(err);
                    });
                };

                const handleSaveProduct = async (e) => {
                    e.preventDefault();
                    setIsSaving(true);
                    try {
                        let imageUrl = productForm.image;
                        if (imageFile) {
                            showToast("Processing image...");
                            imageUrl = await compressImage(imageFile);
                        } else if (!editingProduct && !imageUrl) {
                            showToast("❌ Please upload an image!");
                            setIsSaving(false); return;
                        }

                        const productData = { ...productForm, price: Number(productForm.price), image: imageUrl };

                        if (editingProduct) {
                            await db.collection("products").doc(editingProduct.id).update(productData);
                            showToast("Product updated successfully!");
                        } else {
                            await db.collection("products").add(productData);
                            showToast("Product added successfully!");
                        }
                        
                        setProductForm({ name: '', price: '', category: 'Vests', image: '', description: '' });
                        setImageFile(null); setEditingProduct(null); fetchProducts(); setActiveTab('manage');
                    } catch (error) { showToast("Failed to save product."); }
                    setIsSaving(false);
                };

                const updateOrderStatus = async (id, newStatus) => {
                    try {
                        await db.collection("orders").doc(id).update({ status: newStatus });
                        showToast("Order status updated!");
                        fetchOrders();
                    } catch (error) { showToast("Failed to update status."); }
                };

                if (!isAdminLoggedIn) return (
                    <div className="max-w-md mx-auto px-4 py-20 text-center">
                        <div className="bg-white p-8 rounded-xl shadow-lg border">
                            <i className="fas fa-lock text-5xl text-emerald-800 mb-4 block"></i>
                            <h2 className="text-2xl font-bold mb-6">Admin Access</h2>
                            <form onSubmit={handleLogin}>
                                <input type="password" required value={pinInput} onChange={(e)=>setPinInput(e.target.value)} placeholder="Enter PIN" className="w-full px-4 py-3 border rounded-lg text-center mb-4 text-2xl tracking-widest focus:ring-2 focus:ring-emerald-500 outline-none"/>
                                <button className="w-full bg-emerald-800 hover:bg-emerald-900 text-white py-3 rounded-lg font-bold">Login</button>
                            </form>
                        </div>
                    </div>
                );

                return (
                    <div className="max-w-4xl mx-auto px-4 py-8">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-2xl font-bold text-gray-800">Admin Dashboard</h2>
                            <button onClick={()=>setIsAdminLoggedIn(false)} className="text-red-500 font-bold bg-red-50 px-4 py-2 rounded-lg hover:bg-red-100">Logout</button>
                        </div>
                        <div className="flex bg-white rounded-lg shadow mb-6 border overflow-hidden">
                            <button onClick={()=>setActiveTab('orders')} className={`flex-1 py-3 font-bold ${activeTab==='orders'?'bg-emerald-800 text-white':'text-gray-600 hover:bg-gray-50'}`}>Orders</button>
                            <button onClick={()=>setActiveTab('manage')} className={`flex-1 py-3 font-bold border-l ${activeTab==='manage'?'bg-emerald-800 text-white':'text-gray-600 hover:bg-gray-50'}`}>Products</button>
                            <button onClick={()=>{setActiveTab('add'); setEditingProduct(null); setProductForm({name:'',price:'',category:'Vests',image:'',description:''}); setImageFile(null);}} className={`flex-1 py-3 font-bold border-l ${activeTab==='add'?'bg-emerald-800 text-white':'text-gray-600 hover:bg-gray-50'}`}>{editingProduct?'Edit Product':'Add Product'}</button>
                        </div>

                        {activeTab === 'orders' && (
                            <div className="space-y-4">
                                {isLoadingOrders ? <p className="text-center py-10">Loading orders...</p> : orders.length === 0 ? <p className="text-center py-10">No orders yet.</p> : orders.map(order => (
                                    <div key={order.id} className="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                                        <div className="flex justify-between items-start mb-3 border-b pb-3">
                                            <div>
                                                <h3 className="font-bold text-lg text-gray-800">{order.customer?.name}</h3>
                                                <p className="text-sm text-gray-500">{order.customer?.phone}</p>
                                            </div>
                                            <div className="text-right">
                                                <select value={order.status} onChange={(e)=>updateOrderStatus(order.id, e.target.value)} className={`text-xs px-3 py-1 rounded-full font-bold outline-none cursor-pointer border ${order.status==='Delivered'?'bg-green-100 text-green-800 border-green-200': order.status==='Cancelled'?'bg-red-100 text-red-800 border-red-200' : 'bg-orange-100 text-orange-800 border-orange-200'}`}>
                                                    <option value="Pending">Pending</option><option value="Processing">Processing</option><option value="Delivered">Delivered</option><option value="Cancelled">Cancelled</option>
                                                </select>
                                                <p className="text-xs text-gray-400 mt-2">{formatDate(order.date)}</p>
                                            </div>
                                        </div>
                                        <p className="text-sm text-gray-700 mb-4"><i className="fas fa-map-marker-alt text-emerald-600 mr-2"></i>{order.customer?.address}</p>
                                        <div className="bg-gray-50 p-3 rounded-lg border border-gray-100">
                                            <p className="text-xs font-bold text-gray-500 uppercase mb-2">Order Items:</p>
                                            <ul className="text-sm space-y-1">
                                                {order.items?.map((it,i)=><li key={i} className="flex justify-between"><span>{it.name} <span className="font-bold text-emerald-600">x{it.quantity}</span></span></li>)}
                                            </ul>
                                        </div>
                                        <div className="mt-4 text-right font-extrabold text-emerald-800 text-xl">Total: {formatPrice(order.totalAmount)}</div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'manage' && (
                            <div className="grid gap-4">
                                {products.length === 0 ? <p className="text-center py-10">No products found.</p> : products.map(p => (
                                    <div key={p.id} className="bg-white p-4 rounded-xl border border-gray-200 flex items-center justify-between shadow-sm">
                                        <div className="flex items-center">
                                            <img src={p.image} className="w-16 h-16 rounded-lg object-cover mr-4 border"/>
                                            <div>
                                                <h4 className="font-bold text-gray-800">{p.name}</h4>
                                                <div className="text-emerald-700 font-bold">{formatPrice(p.price)}</div>
                                                <span className="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded mt-1 inline-block">{p.category}</span>
                                            </div>
                                        </div>
                                        <div className="flex space-x-2">
                                            <button onClick={()=>{setEditingProduct(p); setProductForm(p); setImageFile(null); setActiveTab('add');}} className="bg-blue-50 text-blue-600 hover:bg-blue-100 p-3 rounded-lg transition-colors"><i className="fas fa-edit"></i></button>
                                            <button onClick={async()=>{if(window.confirm("Are you sure you want to delete this product?")){await db.collection("products").doc(p.id).delete(); fetchProducts();}}} className="bg-red-50 text-red-600 hover:bg-red-100 p-3 rounded-lg transition-colors"><i className="fas fa-trash"></i></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'add' && (
                            <form onSubmit={handleSaveProduct} className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 space-y-5">
                                <div><label className="block text-gray-700 font-bold mb-2">Product Name</label><input required value={productForm.name} onChange={e=>setProductForm({...productForm, name:e.target.value})} placeholder="e.g. Premium Cotton Socks" className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none"/></div>
                                <div><label className="block text-gray-700 font-bold mb-2">Price (PKR)</label><input required type="number" value={productForm.price} onChange={e=>setProductForm({...productForm, price:e.target.value})} placeholder="e.g. 500" className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none"/></div>
                                <div><label className="block text-gray-700 font-bold mb-2">Category</label><select value={productForm.category} onChange={e=>setProductForm({...productForm, category:e.target.value})} className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">{categories.filter(c=>c!=='All').map(c=><option key={c} value={c}>{c}</option>)}</select></div>
                                <div>
                                    <label className="block text-gray-700 font-bold mb-2">Product Image</label>
                                    <input type="file" accept="image/*" onChange={e => setImageFile(e.target.files[0])} className="w-full p-3 border rounded-lg bg-gray-50 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100" />
                                    {editingProduct && productForm.image && !imageFile && <div className="mt-3"><p className="text-xs text-gray-500 mb-2">Current Image:</p><img src={productForm.image} className="w-20 h-20 rounded-lg object-cover border shadow-sm" /></div>}
                                </div>
                                <div><label className="block text-gray-700 font-bold mb-2">Description</label><textarea required value={productForm.description} onChange={e=>setProductForm({...productForm, description:e.target.value})} placeholder="Product details, fabric quality, sizes..." className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" rows="4"></textarea></div>
                                <button type="submit" disabled={isSaving} className={`w-full text-white py-4 rounded-lg font-bold text-lg shadow-md transition-all ${isSaving ? 'bg-gray-400' : 'bg-emerald-800 hover:bg-emerald-900'}`}>{isSaving ? 'Processing...' : (editingProduct ? 'Update Product' : 'Add Product')}</button>
                            </form>
                        )}
                    </div>
                );
            };

            const AboutView = () => (
                <div className="p-4 max-w-4xl mx-auto py-12">
                    <div className="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
                        <div className="relative h-64 bg-emerald-900 flex items-center justify-center text-center px-4">
                            <div className="absolute inset-0 opacity-20 bg-[url('https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?q=80&w=1920&auto=format&fit=crop')] bg-cover bg-center"></div>
                            <div className="relative z-10 text-white">
                                <i className="fas fa-store text-6xl mb-4 shadow-sm"></i>
                                <h1 className="text-4xl font-extrabold tracking-tight mb-2">New Qari Hosiery Store</h1>
                                <p className="text-emerald-200 text-lg font-medium tracking-wide">Your Trusted Partner in Wholesale & Retail</p>
                            </div>
                        </div>
                        <div className="p-8 md:p-12 space-y-6 text-gray-700 leading-relaxed text-lg">
                            <p>
                                <strong>New Qari Hosiery Store</strong> is a premium wholesale and retail shop where you can find top-quality hosiery products at the most reasonable prices in the market.
                            </p>
                            <p>
                                We carry a vast variety of men's, women's, and kids' hosiery items. From premium quality socks, vests, and caps to gloves, undergarments, and trousers, we have everything you need. Our core mission is to provide outstanding quality fabrics at unbeatable wholesale rates.
                            </p>
                            
                            <div className="bg-emerald-50 p-8 rounded-2xl border border-emerald-100 mt-10">
                                <h3 className="font-extrabold text-2xl mb-6 text-emerald-900"><i className="fas fa-map-marker-alt mr-3 text-emerald-600"></i>Our Location</h3>
                                <div className="space-y-4 text-gray-800">
                                    <p className="flex items-center"><i className="fas fa-map w-6 text-emerald-600"></i> Quaid-e-Azam Market, Near Mubarak Mosque, Faisalabad</p>
                                    <p className="flex items-center font-bold text-xl"><i className="fas fa-phone-alt w-6 text-emerald-600"></i> 0306-5378112</p>
                                </div>
                                <a href="https://wa.me/923065378112" target="_blank" className="mt-8 inline-flex items-center justify-center bg-green-500 hover:bg-green-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition-transform hover:scale-105">
                                    <i className="fab fa-whatsapp text-2xl mr-3"></i> Chat with us on WhatsApp
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const HomeView = () => (
                <div>
                    {/* Beautiful Hero Section */}
                    <div className="relative bg-gray-900 text-white shadow-xl">
                        <div className="absolute inset-0 overflow-hidden">
                            <img src="https://images.unsplash.com/photo-1558769132-cb1fac0840f2?q=80&w=1920&auto=format&fit=crop" className="w-full h-full object-cover opacity-30" alt="Hosiery Background" />
                            <div className="absolute inset-0 bg-gradient-to-b from-emerald-900/60 to-gray-900/90"></div>
                        </div>
                        <div className="relative px-4 py-20 sm:px-6 lg:py-28 lg:px-8 text-center max-w-5xl mx-auto">
                            <span className="inline-block px-4 py-1 rounded-full bg-emerald-500/20 text-emerald-300 border border-emerald-500/30 text-sm font-bold tracking-wider uppercase mb-6 backdrop-blur-sm">Premium Quality</span>
                            <h1 className="text-4xl font-extrabold tracking-tight sm:text-5xl lg:text-6xl mb-6">Welcome to New Qari Hosiery Store</h1>
                            <p className="mt-4 max-w-2xl mx-auto text-xl text-gray-300">Discover our exclusive collection of high-quality hosiery products. The best wholesale and retail rates in Faisalabad.</p>
                            
                            <div className="max-w-xl mx-auto mt-10 relative group">
                                <i className="fas fa-search absolute left-5 top-4 text-gray-400 group-focus-within:text-emerald-500 transition-colors"></i>
                                <input type="text" className="w-full pl-14 pr-6 py-4 rounded-full bg-white/95 text-gray-900 shadow-2xl focus:outline-none focus:ring-4 focus:ring-emerald-500/50 text-lg transition-all" placeholder="Search for products, categories..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                            </div>
                        </div>
                    </div>

                    {/* Categories Strip */}
                    <div className="bg-white border-b shadow-sm sticky top-16 z-30">
                        <div className="max-w-7xl mx-auto overflow-x-auto py-4 px-4 whitespace-nowrap hide-scrollbar flex gap-3 md:justify-center">
                            {categories.map((cat) => (
                                <button 
                                    key={cat} 
                                    onClick={() => setSelectedCategory(cat)}
                                    className={`px-6 py-2.5 rounded-full font-bold text-sm transition-all shadow-sm border ${selectedCategory === cat ? 'bg-emerald-800 text-white border-emerald-800 scale-105' : 'bg-white text-gray-600 border-gray-200 hover:border-emerald-300 hover:text-emerald-700'}`}
                                >
                                    {cat}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Products Grid */}
                    <div className="bg-gray-50 p-4 md:p-8">
                        <div className="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-8">
                            {isLoading ? <div className="col-span-full text-center py-20 text-emerald-800 font-bold text-xl"><i className="fas fa-spinner fa-spin mr-3"></i> Loading our amazing products...</div> : 
                            products.filter(p=>selectedCategory==='All'||p.category===selectedCategory).filter(p=>p.name.toLowerCase().includes(searchQuery.toLowerCase())).map(p => (
                                <div key={p.id} className="bg-white rounded-2xl shadow hover:shadow-xl transition-all duration-300 border border-gray-100 flex flex-col overflow-hidden group cursor-pointer transform hover:-translate-y-1" onClick={() => setSelectedProduct(p)}>
                                    <div className="relative overflow-hidden bg-gray-100">
                                        <img src={p.image} className="w-full h-48 md:h-64 object-cover group-hover:scale-110 transition-transform duration-500"/>
                                        <div className="absolute top-3 right-3 bg-white/95 text-emerald-800 text-xs font-bold px-3 py-1.5 rounded-full shadow-sm backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-opacity">
                                            <i className="fas fa-search-plus mr-1"></i> Quick View
                                        </div>
                                    </div>
                                    <div className="p-4 md:p-5 flex flex-col flex-1">
                                        <p className="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">{p.category}</p>
                                        <h3 className="font-bold text-gray-900 text-base md:text-lg line-clamp-2 leading-tight">{p.name}</h3>
                                        <div className="mt-auto pt-4 flex justify-between items-center">
                                            <span className="text-emerald-800 font-extrabold text-xl">{formatPrice(p.price)}</span>
                                            <button onClick={(e)=>{e.stopPropagation(); addToCart(p);}} className="bg-gray-100 text-emerald-800 hover:bg-emerald-800 hover:text-white w-10 h-10 rounded-full flex items-center justify-center transition-colors shadow-sm">
                                                <i className="fas fa-shopping-bag"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-20 overflow-x-hidden font-sans">
                    <Navbar />
                    <MobileMenu />
                    
                    {toastMessage && <div className="fixed top-24 left-1/2 -translate-x-1/2 z-[100] bg-gray-900 text-white px-6 py-3 rounded-full text-sm font-bold shadow-xl animate-bounce flex items-center"><i className="fas fa-check-circle mr-2 text-emerald-400"></i> {toastMessage}</div>}
                    
                    {view === 'home' && <HomeView />}
                    {view === 'admin' && <AdminView />}
                    {view === 'about' && <AboutView />}
                    
                    {/* Product Modal */}
                    {selectedProduct && (
                        <div className="fixed inset-0 bg-gray-900/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm" onClick={() => setSelectedProduct(null)}>
                            <div className="bg-white rounded-3xl w-full max-w-lg overflow-hidden relative shadow-2xl transform transition-all animate-slide-in-left" onClick={(e) => e.stopPropagation()}>
                                <button onClick={() => setSelectedProduct(null)} className="absolute top-4 right-4 bg-white/80 backdrop-blur text-gray-800 w-10 h-10 rounded-full flex items-center justify-center shadow hover:bg-white z-10 transition-colors">
                                    <i className="fas fa-times text-xl"></i>
                                </button>
                                <img src={selectedProduct.image} className="w-full h-80 object-cover bg-gray-100" />
                                <div className="p-8">
                                    <span className="bg-emerald-100 text-emerald-800 text-xs px-3 py-1 rounded-full font-bold mb-3 inline-block uppercase tracking-wider">{selectedProduct.category}</span>
                                    <h2 className="text-3xl font-extrabold text-gray-900 mb-3 leading-tight">{selectedProduct.name}</h2>
                                    <p className="text-gray-600 text-base leading-relaxed mb-8 whitespace-pre-line">{selectedProduct.description}</p>
                                    <div className="flex items-center justify-between border-t border-gray-100 pt-6">
                                        <div>
                                            <p className="text-sm text-gray-400 font-bold">Price</p>
                                            <span className="text-emerald-800 text-4xl font-extrabold">{formatPrice(selectedProduct.price)}</span>
                                        </div>
                                        <button onClick={() => { addToCart(selectedProduct); setSelectedProduct(null); }} className="bg-emerald-800 hover:bg-emerald-900 text-white px-8 py-4 rounded-xl font-bold shadow-lg shadow-emerald-200 transition-transform hover:-translate-y-1 flex items-center">
                                            <i className="fas fa-shopping-cart mr-2"></i> Add to Cart
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Cart View */}
                    {view === 'cart' && (
                        <div className="p-4 max-w-4xl mx-auto py-10">
                            <button onClick={()=>setView('home')} className="mb-8 text-emerald-700 font-bold flex items-center hover:text-emerald-800 transition-colors"><i className="fas fa-arrow-left mr-2"></i> Continue Shopping</button>
                            <h2 className="text-3xl font-extrabold mb-8 text-gray-900">Your Shopping Cart</h2>
                            {cart.length === 0 ? (
                                <div className="text-center py-24 bg-white rounded-3xl shadow-sm border border-gray-100"><i className="fas fa-shopping-basket text-8xl text-gray-200 mb-6 block"></i><p className="text-gray-500 font-bold text-xl">Your cart is currently empty.</p><button onClick={()=>setView('home')} className="mt-6 bg-emerald-800 text-white px-8 py-3 rounded-full font-bold shadow-md hover:bg-emerald-900 transition-colors">Start Shopping</button></div>
                            ) : (
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <div className="lg:col-span-2 space-y-4">
                                        {cart.map(i=>(
                                            <div key={i.id} className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center">
                                                <img src={i.image} className="w-24 h-24 rounded-xl object-cover bg-gray-50 mr-5"/>
                                                <div className="flex-1">
                                                    <h4 className="font-bold text-gray-900 text-lg line-clamp-1 mb-1">{i.name}</h4>
                                                    <div className="text-emerald-700 font-extrabold text-lg">{formatPrice(i.price * i.quantity)}</div>
                                                </div>
                                                <div className="flex flex-col items-end space-y-3">
                                                    <button onClick={()=>setCart(prev=>prev.filter(it=>it.id!==i.id))} className="text-gray-400 hover:text-red-500 transition-colors"><i className="fas fa-trash-alt"></i></button>
                                                    <div className="flex items-center space-x-3 bg-gray-50 rounded-lg p-1.5 border border-gray-200">
                                                        <button onClick={()=>setCart(prev=>prev.map(it=>it.id===i.id&&it.quantity>1?{...it,quantity:it.quantity-1}:it))} className="w-8 h-8 bg-white shadow-sm rounded-md text-gray-600 hover:text-red-600 flex items-center justify-center font-bold"><i className="fas fa-minus text-xs"></i></button>
                                                        <span className="w-6 text-center font-bold">{i.quantity}</span>
                                                        <button onClick={()=>setCart(prev=>prev.map(it=>it.id===i.id?{...it,quantity:it.quantity+1}:it))} className="w-8 h-8 bg-emerald-800 shadow-sm rounded-md text-white hover:bg-emerald-900 flex items-center justify-center font-bold"><i className="fas fa-plus text-xs"></i></button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="bg-white p-8 rounded-3xl shadow-lg border border-gray-100 h-fit sticky top-24">
                                        <h3 className="font-bold text-xl mb-6 text-gray-900 border-b pb-4">Order Summary</h3>
                                        <div className="flex justify-between mb-4 text-gray-600"><span className="font-medium">Subtotal</span><span className="font-bold">{formatPrice(cart.reduce((a,b)=>a+(b.price*b.quantity),0))}</span></div>
                                        <div className="flex justify-between mb-6 text-gray-600 border-b pb-6"><span className="font-medium">Delivery Charges</span><span className="font-bold text-emerald-600">+{formatPrice(DELIVERY_CHARGE)}</span></div>
                                        <div className="flex justify-between font-extrabold text-2xl text-gray-900 mb-8"><span>Total</span><span className="text-emerald-800">{formatPrice(cart.reduce((a,b)=>a+(b.price*b.quantity),0)+DELIVERY_CHARGE)}</span></div>
                                        <button onClick={()=>setView('checkout')} className="w-full bg-emerald-800 hover:bg-emerald-900 text-white py-4 rounded-xl font-bold text-lg shadow-xl shadow-emerald-200 transition-transform hover:-translate-y-1">Proceed to Checkout</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                    
                    {/* Checkout View */}
                    {view === 'checkout' && (
                        <div className="p-4 max-w-2xl mx-auto py-10">
                            <button onClick={()=>setView('cart')} className="mb-8 text-emerald-700 font-bold flex items-center hover:text-emerald-800"><i className="fas fa-arrow-left mr-2"></i> Back to Cart</button>
                            <div className="bg-white p-8 md:p-10 rounded-3xl shadow-xl border border-gray-100">
                                <h2 className="text-3xl font-extrabold mb-8 border-b pb-4 text-gray-900">Delivery Details</h2>
                                <form className="space-y-6" onSubmit={async(e)=>{
                                    e.preventDefault();
                                    const cust = { name: e.target.name.value, phone: e.target.phone.value, address: e.target.address.value };
                                    const total = cart.reduce((a,b)=>a+(b.price*b.quantity),0) + DELIVERY_CHARGE;
                                    await db.collection("orders").add({ customer: cust, items: cart, totalAmount: total, date: new Date().toISOString(), status: 'Pending' });
                                    let msg = `*New Order Received!* 🛍️%0A%0A*👤 Name:* ${cust.name}%0A*📞 Phone:* ${cust.phone}%0A*📍 Address:* ${cust.address}%0A%0A*💰 Total Bill:* Rs. ${total}`;
                                    window.open(`https://wa.me/923065378112?text=${msg}`, '_blank');
                                    setCart([]); setView('success');
                                }}>
                                    <div>
                                        <label className="block text-gray-700 font-bold mb-2">Full Name</label>
                                        <input name="name" required placeholder="Enter your full name" className="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all"/>
                                    </div>
                                    <div>
                                        <label className="block text-gray-700 font-bold mb-2">Mobile Number</label>
                                        <input name="phone" required placeholder="03XX-XXXXXXX" className="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all"/>
                                    </div>
                                    <div>
                                        <label className="block text-gray-700 font-bold mb-2">Complete Address</label>
                                        <textarea name="address" required placeholder="House number, Street, Area, City..." className="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all" rows="4"></textarea>
                                    </div>
                                    <div className="bg-emerald-50 p-6 rounded-2xl border border-emerald-100 my-8">
                                        <div className="flex justify-between items-center text-lg"><span className="font-bold text-gray-800">Amount to Pay (COD):</span><span className="font-extrabold text-2xl text-emerald-800">{formatPrice(cart.reduce((a,b)=>a+(b.price*b.quantity),0)+DELIVERY_CHARGE)}</span></div>
                                    </div>
                                    <button className="w-full bg-emerald-800 hover:bg-emerald-900 text-white py-4 rounded-xl font-bold text-xl shadow-xl shadow-emerald-200 mt-4 flex justify-center items-center transition-transform hover:-translate-y-1">
                                        <i className="fab fa-whatsapp text-2xl mr-3"></i> Confirm Order
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Success View */}
                    {view === 'success' && (
                        <div className="text-center py-24 px-4 max-w-md mx-auto">
                            <div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                <i className="fas fa-check text-5xl text-green-500 animate-pulse"></i>
                            </div>
                            <h2 className="text-4xl font-extrabold mb-4 text-gray-900">Order Placed!</h2>
                            <p className="mb-10 text-gray-600 text-lg">Your order has been successfully recorded. We will contact you shortly on your provided number.</p>
                            <button onClick={()=>setView('home')} className="bg-emerald-800 hover:bg-emerald-900 text-white px-10 py-4 rounded-full font-bold shadow-lg transition-transform hover:scale-105">Continue Shopping</button>
                        </div>
                    )}

                    <a href="https://wa.me/923065378112?text=Hello, I need some information regarding your store." target="_blank" className="fixed bottom-6 right-6 bg-green-500 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-2xl shadow-green-300 text-3xl z-40 hover:bg-green-600 transition-transform hover:scale-110">
                        <i className="fab fa-whatsapp"></i>
                    </a>

                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
