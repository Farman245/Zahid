<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Qari Hosiery Store | Premium Quality</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        .animate-menu { animation: slideIn 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const firebaseConfig = {
            apiKey: "AIzaSyCxr3iEVkcaqKyP7Mcmb1eZafcPGLOJUB0",
            authDomain: "numan-8e439.firebaseapp.com",
            projectId: "numan-8e439",
            storageBucket: "numan-8e439.firebasestorage.app",
            messagingSenderId: "791551549061",
            appId: "1:791551549061:web:757340191fd3e6425d53ec"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const categories = ['All', 'Vests', 'Caps', 'Trousers', 'Undergarments', 'Accessories'];

        function App() {
            const [view, setView] = useState('home');
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [isLoading, setIsLoading] = useState(true);
            const [isAdmin, setIsAdmin] = useState(false);
            const [secretClicks, setSecretClicks] = useState(0);

            useEffect(() => {
                const unsubscribe = db.collection("products").onSnapshot(snap => {
                    setProducts(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
                    setIsLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleSecret = () => {
                setSecretClicks(prev => {
                    if (prev + 1 >= 3) { setView('admin'); return 0; }
                    return prev + 1;
                });
                setTimeout(() => setSecretClicks(0), 2000);
            };

            const Navbar = () => (
                <nav className="bg-emerald-800 text-white p-4 sticky top-0 z-50 shadow-lg flex justify-between items-center">
                    <div className="flex items-center gap-4">
                        <button onClick={() => setIsMenuOpen(true)} className="p-2"><i className="fas fa-bars text-xl"></i></button>
                        <h1 className="font-bold text-lg cursor-pointer select-none" onClick={handleSecret}>New Qari Hosiery</h1>
                    </div>
                    <button onClick={() => setView('cart')} className="relative p-2">
                        <i className="fas fa-shopping-bag text-2xl"></i>
                        {cart.length > 0 && <span className="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center border-2 border-emerald-800">{cart.reduce((a,b)=>a+b.quantity,0)}</span>}
                    </button>
                </nav>
            );

            const Home = () => (
                <div>
                    <div className="relative h-64 bg-emerald-900 flex items-center justify-center text-center px-6">
                        <div className="absolute inset-0 opacity-40 bg-[url('https://images.unsplash.com/photo-1558769132-cb1fac0840f2?auto=format&fit=crop&w=800')] bg-cover bg-center"></div>
                        <div className="relative z-10 text-white">
                            <h2 className="text-3xl font-black mb-2 uppercase tracking-tight">Qari Hosiery Store</h2>
                            <p className="text-emerald-100 text-sm">Wholesale & Retail Market, Faisalabad</p>
                        </div>
                    </div>
                    <div className="p-4 grid grid-cols-2 md:grid-cols-4 gap-4 max-w-7xl mx-auto">
                        {isLoading ? <p className="col-span-full text-center py-20 font-bold text-gray-400">Loading Collection...</p> : 
                         products.filter(p => selectedCategory === 'All' || p.category === selectedCategory).map(p => (
                            <div key={p.id} className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden flex flex-col transition-all active:scale-95">
                                <img src={p.image} className="w-full h-44 object-cover" />
                                <div className="p-4 flex-1 flex flex-col">
                                    <h3 className="font-bold text-sm mb-1 line-clamp-1">{p.name}</h3>
                                    <div className="flex items-baseline gap-1 mb-3">
                                        <p className="text-emerald-800 font-black text-xl">Rs. {p.price}</p>
                                        <span className="text-[10px] text-gray-400 font-bold">/ {p.unit || 'Pc'}</span>
                                    </div>
                                    <button onClick={() => {
                                        setCart(prev => {
                                            const ex = prev.find(i => i.id === p.id);
                                            if(ex) return prev.map(i => i.id === p.id ? {...i, quantity: i.quantity + 1} : i);
                                            return [...prev, {...p, quantity: 1}];
                                        });
                                    }} className="mt-auto w-full bg-emerald-800 text-white py-3 rounded-2xl text-xs font-black shadow-lg">Add to Cart</button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const AdminPanel = () => {
                const [pForm, setPForm] = useState({ name: '', price: '', unit: '', category: 'Vests', description: '' });
                const [editId, setEditId] = useState(null);
                const [imgFile, setImgFile] = useState(null);
                const [isSaving, setIsSaving] = useState(false);

                const handleEdit = (p) => {
                    setEditId(p.id);
                    setPForm({ name: p.name, price: p.price, unit: p.unit, category: p.category, description: p.description || '' });
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };

                const saveProduct = async (e) => {
                    e.preventDefault();
                    setIsSaving(true);
                    try {
                        let imgUrl = editId ? products.find(p => p.id === editId).image : "";
                        if (imgFile) {
                            const reader = new FileReader();
                            reader.readAsDataURL(imgFile);
                            imgUrl = await new Promise(res => {
                                reader.onload = (ev) => {
                                    const img = new Image();
                                    img.src = ev.target.result;
                                    img.onload = () => {
                                        const canvas = document.createElement('canvas');
                                        canvas.width = 600; canvas.height = 600;
                                        canvas.getContext('2d').drawImage(img, 0, 0, 600, 600);
                                        res(canvas.toDataURL('image/jpeg', 0.6));
                                    }
                                }
                            });
                        }
                        const finalData = { ...pForm, price: Number(pForm.price), image: imgUrl };
                        if (editId) {
                            await db.collection("products").doc(editId).update(finalData);
                            alert("Product Updated!");
                        } else {
                            await db.collection("products").add(finalData);
                            alert("Product Added!");
                        }
                        setPForm({ name: '', price: '', unit: '', category: 'Vests', description: '' });
                        setEditId(null);
                        setImgFile(null);
                    } catch (err) { alert("Error saving product"); }
                    setIsSaving(false);
                };

                if(!isAdmin) return (
                    <div className="p-10 text-center flex flex-col items-center">
                        <i className="fas fa-lock text-5xl text-gray-300 mb-4"></i>
                        <h2 className="text-2xl font-bold mb-6">Admin Access</h2>
                        <input type="password" placeholder="Enter PIN" className="border-2 p-4 rounded-2xl w-full max-w-xs text-center text-2xl tracking-widest outline-none focus:border-emerald-600" onChange={e => e.target.value === '7860' && setIsAdmin(true)} />
                    </div>
                );

                return (
                    <div className="p-6 max-w-xl mx-auto">
                        <div className="flex justify-between items-center mb-8">
                            <h2 className="text-2xl font-bold text-emerald-800">{editId ? "Edit Product" : "Add New Product"}</h2>
                            <button onClick={()=>setIsAdmin(false)} className="text-red-500 font-bold">Logout</button>
                        </div>
                        <form className="space-y-4 bg-white p-6 rounded-3xl shadow-lg border border-gray-100" onSubmit={saveProduct}>
                            <input required placeholder="Product Name" className="w-full p-4 bg-gray-50 rounded-xl outline-none" value={pForm.name} onChange={e=>setPForm({...pForm, name:e.target.value})} />
                            <div className="grid grid-cols-2 gap-4">
                                <input required type="number" placeholder="Price (PKR)" className="w-full p-4 bg-gray-50 rounded-xl outline-none" value={pForm.price} onChange={e=>setPForm({...pForm, price:e.target.value})} />
                                <input required placeholder="Unit (e.g. 12 Pcs)" className="w-full p-4 bg-gray-50 rounded-xl outline-none" value={pForm.unit} onChange={e=>setPForm({...pForm, unit:e.target.value})} />
                            </div>
                            <select className="w-full p-4 bg-gray-50 rounded-xl outline-none" value={pForm.category} onChange={e=>setPForm({...pForm, category:e.target.value})}>
                                {categories.filter(c=>c!=='All').map(c=><option key={c} value={c}>{c}</option>)}
                            </select>
                            <div>
                                <label className="text-[10px] font-bold text-gray-400 mb-1 block uppercase">Product Image {editId && "(Leave empty to keep old)"}</label>
                                <input type="file" accept="image/*" className="w-full p-4 bg-gray-50 rounded-xl outline-none" onChange={e=>setImgFile(e.target.files[0])} />
                            </div>
                            <button disabled={isSaving} className="w-full bg-emerald-800 text-white py-4 rounded-2xl font-black shadow-xl disabled:bg-gray-400">
                                {isSaving ? "Saving..." : (editId ? "Update Product" : "Add Product")}
                            </button>
                            {editId && <button type="button" onClick={()=>{setEditId(null); setPForm({name:'',price:'',unit:'',category:'Vests',description:''});}} className="w-full text-gray-400 font-bold">Cancel Editing</button>}
                        </form>
                        
                        <div className="mt-10 space-y-3">
                            <h3 className="font-bold text-gray-400 uppercase text-xs">Current Inventory ({products.length})</h3>
                            {products.map(p => (
                                <div key={p.id} className="bg-white p-4 rounded-2xl flex items-center justify-between border shadow-sm">
                                    <div className="flex items-center gap-4">
                                        <img src={p.image} className="w-12 h-12 rounded-xl object-cover" />
                                        <div>
                                            <p className="font-bold text-sm">{p.name}</p>
                                            <p className="text-xs text-emerald-700 font-bold">Rs. {p.price} / {p.unit}</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={()=>handleEdit(p)} className="bg-blue-50 text-blue-500 w-10 h-10 rounded-full flex items-center justify-center"><i className="fas fa-edit"></i></button>
                                        <button onClick={()=>confirm("Delete this?") && db.collection("products").doc(p.id).delete()} className="bg-red-50 text-red-500 w-10 h-10 rounded-full flex items-center justify-center"><i className="fas fa-trash-alt"></i></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen">
                    <Navbar />
                    {isMenuOpen && (
                        <div className="fixed inset-0 z-[60] flex">
                            <div className="bg-black/50 flex-1" onClick={() => setIsMenuOpen(false)}></div>
                            <div className="bg-white w-72 p-6 animate-menu shadow-2xl flex flex-col">
                                <div className="flex justify-between items-center mb-10">
                                    <h3 className="font-bold text-xl text-emerald-800">Menu</h3>
                                    <button onClick={() => setIsMenuOpen(false)}><i className="fas fa-times text-gray-400"></i></button>
                                </div>
                                <div className="space-y-4 flex-1">
                                    <button className="w-full text-left p-4 rounded-2xl hover:bg-emerald-50 font-bold" onClick={() => {setView('home'); setIsMenuOpen(false);}}>Home</button>
                                    <div className="pt-6 border-t mt-6">
                                        <p className="text-gray-400 text-[10px] font-black uppercase mb-4 tracking-widest px-4">Categories</p>
                                        {categories.map(c => (
                                            <button key={c} className={`w-full text-left p-4 rounded-2xl mb-1 font-semibold ${selectedCategory === c ? 'bg-emerald-800 text-white shadow-md' : 'hover:bg-emerald-50'}`} onClick={() => {setSelectedCategory(c); setView('home'); setIsMenuOpen(false);}}>{c}</button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'home' && <Home />}
                    {view === 'admin' && <AdminPanel />}
                    {view === 'cart' && (
                        <div className="p-6 max-w-2xl mx-auto py-10">
                            <h2 className="text-3xl font-black mb-8">Cart</h2>
                            {cart.length === 0 ? <p className="text-center py-20 text-gray-400">Empty.</p> : (
                                <div className="space-y-4">
                                    {cart.map(item => (
                                        <div key={item.id} className="bg-white p-4 rounded-2xl shadow-sm border flex items-center gap-4">
                                            <img src={item.image} className="w-16 h-16 rounded-xl object-cover" />
                                            <div className="flex-1">
                                                <p className="font-bold">{item.name}</p>
                                                <p className="text-emerald-700 font-bold">Rs. {item.price} / {item.unit} x {item.quantity}</p>
                                            </div>
                                            <button onClick={() => setCart(prev => prev.filter(i => i.id !== item.id))} className="text-red-400 p-2"><i className="fas fa-trash"></i></button>
                                        </div>
                                    ))}
                                    <div className="bg-emerald-900 text-white p-8 rounded-3xl shadow-xl mt-10">
                                        <div className="flex justify-between text-2xl font-black"><span>Total Bill</span><span>Rs. {cart.reduce((a,b)=>a+(b.price*b.quantity), 0) + 250}</span></div>
                                        <button className="w-full bg-white text-emerald-900 py-4 rounded-2xl mt-6 font-black" onClick={() => {
                                            const total = cart.reduce((a,b)=>a+(b.price*b.quantity), 0) + 250;
                                            const msg = `*Order from Qari Hosiery Store*%0A%0A*Items:*%0A${cart.map(i => `- ${i.name} (Rs. ${i.price} / ${i.unit}) x${i.quantity}`).join('%0A')}%0A%0A*Total:* Rs. ${total}`;
                                            window.open(`https://wa.me/923065378112?text=${msg}`);
                                            setCart([]); setView('home');
                                        }}>WhatsApp Order</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
