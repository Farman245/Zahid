<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Qari Hosiery Store</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50 font-sans text-right">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCxr3iEVkcaqKyP7Mcmb1eZafcPGLOJUB0",
            authDomain: "numan-8e439.firebaseapp.com",
            projectId: "numan-8e439",
            storageBucket: "numan-8e439.firebasestorage.app",
            messagingSenderId: "791551549061",
            appId: "1:791551549061:web:757340191fd3e6425d53ec"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const DELIVERY_CHARGE = 250; 
        const categories = ['All', 'Vests', 'Caps', 'Trousers', 'Undergarments', 'Accessories'];

        function App() {
            const [view, setView] = useState('home'); 
            const [products, setProducts] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [cart, setCart] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [toastMessage, setToastMessage] = useState(null);
            
            const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);
            const [secretClicks, setSecretClicks] = useState(0);
            const [selectedProduct, setSelectedProduct] = useState(null);

            const fetchProducts = async () => {
                setIsLoading(true);
                try {
                    const querySnapshot = await db.collection("products").get();
                    setProducts(querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                } catch (error) { showToast("ڈیٹا بیس سے رابطہ نہیں ہو سکا۔"); }
                setIsLoading(false);
            };

            useEffect(() => { fetchProducts(); }, []);

            const showToast = (message) => {
                setToastMessage(message);
                setTimeout(() => setToastMessage(null), 3000);
            };

            const formatPrice = (price) => new Intl.NumberFormat('en-PK', { style: 'currency', currency: 'PKR', maximumFractionDigits: 0 }).format(price);
            const formatDate = (dateString) => new Date(dateString).toLocaleString('ur-PK');

            const handleSecretDoor = () => {
                const newClicks = secretClicks + 1;
                setSecretClicks(newClicks);
                if (newClicks >= 3) { setView('admin'); setSecretClicks(0); }
                setTimeout(() => setSecretClicks(0), 2000); 
            };

            const addToCart = (product) => {
                setCart((prevCart) => {
                    const existingItem = prevCart.find((item) => item.id === product.id);
                    if (existingItem) return prevCart.map((item) => item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item);
                    return [...prevCart, { ...product, quantity: 1 }];
                });
                showToast(product.name + " ٹوکری میں شامل کر دیا گیا!");
            };

            const Navbar = () => (
                <nav className="bg-emerald-700 text-white shadow-lg sticky top-0 z-50">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between h-16 items-center">
                            <div className="flex items-center">
                                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="md:hidden ml-4 p-2 rounded-md hover:bg-emerald-600">
                                    <i className={`fas ${isMobileMenuOpen ? 'fa-times' : 'fa-bars'} text-xl`}></i>
                                </button>
                                <div className="flex-shrink-0 flex items-center cursor-pointer select-none" onClick={handleSecretDoor}>
                                    <i className="fas fa-shopping-cart text-emerald-300 text-xl ml-2"></i>
                                    <span className="font-bold text-lg tracking-tight">New Qari Hosiery</span>
                                </div>
                            </div>
                            <div className="hidden md:flex flex-1 max-w-lg mx-8">
                                <div className="relative w-full text-gray-900">
                                    <div className="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none"><i className="fas fa-search text-gray-400"></i></div>
                                    <input type="text" className="block w-full pr-10 pl-3 py-2 rounded-lg bg-emerald-50 focus:bg-white text-right" placeholder="تلاش کریں..." value={searchQuery} onChange={(e) => { setSearchQuery(e.target.value); if (view !== 'home') setView('home'); }} />
                                </div>
                            </div>
                            <div className="flex items-center space-x-4 space-x-reverse">
                                <button onClick={() => setView('cart')} className="relative p-2 rounded-full hover:bg-emerald-600">
                                    <i className="fas fa-shopping-cart text-xl"></i>
                                    {cart.length > 0 && <span className="absolute top-0 left-0 inline-flex items-center justify-center px-2 py-1 text-xs font-bold text-red-100 transform -translate-x-1/4 -translate-y-1/4 bg-red-600 rounded-full">{cart.reduce((a,b)=>a+b.quantity,0)}</span>}
                                </button>
                            </div>
                        </div>
                    </div>
                </nav>
            );

            const AdminView = () => {
                const [activeTab, setActiveTab] = useState('orders'); 
                const [editingProduct, setEditingProduct] = useState(null);
                const [productForm, setProductForm] = useState({ name: '', price: '', category: 'Vests', image: '', description: '' });
                const [imageFile, setImageFile] = useState(null); 
                const [orders, setOrders] = useState([]);
                const [isLoadingOrders, setIsLoadingOrders] = useState(false);
                const [pinInput, setPinInput] = useState('');
                const [isSaving, setIsSaving] = useState(false);

                const fetchOrders = async () => {
                    setIsLoadingOrders(true);
                    try {
                        const snapshot = await db.collection("orders").get();
                        setOrders(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b)=>new Date(b.date)-new Date(a.date)));
                    } catch (error) { showToast("آرڈرز لوڈ نہیں ہو سکے۔"); }
                    setIsLoadingOrders(false);
                };

                useEffect(() => { if (activeTab === 'orders' && isAdminLoggedIn) fetchOrders(); }, [activeTab, isAdminLoggedIn]);

                const handleLogin = (e) => {
                    e.preventDefault();
                    if (pinInput === '7860') { setIsAdminLoggedIn(true); showToast("خوش آمدید!"); }
                    else { showToast("غلط پاسورڈ!"); setPinInput(''); }
                };

                // آٹو کمپریس فیچر (تصویر کو ہلکا بنانے کے لیے)
                const compressImage = (file) => {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.readAsDataURL(file);
                        reader.onload = (event) => {
                            const img = new Image();
                            img.src = event.target.result;
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                const MAX_WIDTH = 600;
                                const MAX_HEIGHT = 600;
                                let width = img.width;
                                let height = img.height;

                                if (width > height) {
                                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                                } else {
                                    if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                                }
                                canvas.width = width;
                                canvas.height = height;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, 0, 0, width, height);
                                resolve(canvas.toDataURL('image/jpeg', 0.6)); // 60% کوالٹی پر کمپریس
                            };
                            img.onerror = (err) => reject(err);
                        };
                        reader.onerror = (err) => reject(err);
                    });
                };

                // پروڈکٹ سیو کرنے کا نیا فنکشن (بغیر سٹوریج کے)
                const handleSaveProduct = async (e) => {
                    e.preventDefault();
                    setIsSaving(true);
                    
                    try {
                        let imageUrl = productForm.image;

                        // اگر تصویر گیلری سے سلیکٹ ہوئی ہے تو اسے کمپریس کر کے سیو کریں
                        if (imageFile) {
                            showToast("تصویر خودکار سیٹ ہو رہی ہے، انتظار کریں...");
                            imageUrl = await compressImage(imageFile);
                        } else if (!editingProduct && !imageUrl) {
                            showToast("❌ براہ کرم تصویر اپلوڈ کریں!");
                            setIsSaving(false);
                            return;
                        }

                        const productData = { ...productForm, price: Number(productForm.price), image: imageUrl };

                        if (editingProduct) {
                            await db.collection("products").doc(editingProduct.id).update(productData);
                            showToast("پروڈکٹ کامیابی سے اپڈیٹ ہو گئی!");
                        } else {
                            await db.collection("products").add(productData);
                            showToast("نئی پروڈکٹ کامیابی سے شامل ہو گئی!");
                        }
                        
                        setProductForm({ name: '', price: '', category: 'Vests', image: '', description: '' });
                        setImageFile(null); 
                        setEditingProduct(null);
                        fetchProducts();
                        setActiveTab('manage');
                    } catch (error) { 
                        console.error(error);
                        showToast("محفوظ کرنے میں مسئلہ ہوا۔"); 
                    }
                    setIsSaving(false);
                };

                const updateOrderStatus = async (id, newStatus) => {
                    try {
                        await db.collection("orders").doc(id).update({ status: newStatus });
                        showToast("آرڈر اسٹیٹس اپڈیٹ ہو گیا!");
                        fetchOrders();
                    } catch (error) { showToast("اپڈیٹ نہیں ہو سکا۔"); }
                };

                const startEdit = (p) => { 
                    setEditingProduct(p); 
                    setProductForm(p); 
                    setImageFile(null); 
                    setActiveTab('add'); 
                };

                if (!isAdminLoggedIn) return (
                    <div className="max-w-md mx-auto px-4 py-20 text-center">
                        <div className="bg-white p-8 rounded-xl shadow-lg border">
                            <i className="fas fa-lock text-5xl text-emerald-600 mb-4 block"></i>
                            <h2 className="text-2xl font-bold mb-6">ایڈمن لاگ ان</h2>
                            <form onSubmit={handleLogin}><input type="password" required value={pinInput} onChange={(e)=>setPinInput(e.target.value)} placeholder="پاسورڈ درج کریں" className="w-full px-4 py-3 border rounded-lg text-center mb-4 text-2xl tracking-widest" dir="ltr"/><button className="w-full bg-emerald-600 text-white py-3 rounded-lg font-bold">داخل ہوں</button></form>
                        </div>
                    </div>
                );

                return (
                    <div className="max-w-4xl mx-auto px-4 py-8">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-2xl font-bold">ایڈمن کنٹرول</h2>
                            <button onClick={()=>setIsAdminLoggedIn(false)} className="text-red-500 font-bold">لاگ آؤٹ</button>
                        </div>
                        <div className="flex bg-white rounded-lg shadow mb-6 border overflow-hidden">
                            <button onClick={()=>setActiveTab('orders')} className={`flex-1 py-3 font-bold ${activeTab==='orders'?'bg-emerald-600 text-white':'text-gray-600'}`}>آرڈرز</button>
                            <button onClick={()=>setActiveTab('manage')} className={`flex-1 py-3 font-bold border-r ${activeTab==='manage'?'bg-emerald-600 text-white':'text-gray-600'}`}>پروڈکٹس</button>
                            <button onClick={()=>{setActiveTab('add'); setEditingProduct(null); setProductForm({name:'',price:'',category:'Vests',image:'',description:''}); setImageFile(null);}} className={`flex-1 py-3 font-bold border-r ${activeTab==='add'?'bg-emerald-600 text-white':'text-gray-600'}`}>{editingProduct?'ایڈٹ پروڈکٹ':'نئی پروڈکٹ'}</button>
                        </div>

                        {activeTab === 'orders' && (
                            <div className="space-y-4">
                                {isLoadingOrders ? <p>لوڈ ہو رہا ہے...</p> : orders.map(order => (
                                    <div key={order.id} className="bg-white p-4 rounded-lg shadow border">
                                        <div className="flex justify-between mb-2">
                                            <span className="font-bold text-lg">{order.customer?.name}</span>
                                            <select value={order.status} onChange={(e)=>updateOrderStatus(order.id, e.target.value)} className={`text-xs px-2 py-1 rounded font-bold ${order.status==='Delivered'?'bg-green-100 text-green-800':'bg-orange-100 text-orange-800'}`}>
                                                <option value="Pending">Pending</option>
                                                <option value="Processing">Processing</option>
                                                <option value="Delivered">Delivered</option>
                                                <option value="Cancelled">Cancelled</option>
                                            </select>
                                        </div>
                                        <p className="text-sm text-gray-600 mb-2">{order.customer?.address} | <span dir="ltr">{order.customer?.phone}</span></p>
                                        <div className="text-xs bg-gray-50 p-2 rounded">
                                            {order.items?.map((it,i)=><div key={i}>{it.name} x{it.quantity}</div>)}
                                        </div>
                                        <div className="mt-2 font-bold text-emerald-700">کل بل: {formatPrice(order.totalAmount)}</div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'manage' && (
                            <div className="grid gap-3">
                                {products.map(p => (
                                    <div key={p.id} className="bg-white p-3 rounded-lg border flex items-center justify-between">
                                        <div className="flex items-center"><img src={p.image} className="w-12 h-12 rounded object-cover mr-3"/><div><div className="font-bold">{p.name}</div><div className="text-emerald-600 text-sm">{formatPrice(p.price)}</div></div></div>
                                        <div className="flex space-x-2 space-x-reverse">
                                            <button onClick={()=>startEdit(p)} className="bg-blue-50 text-blue-600 p-2 rounded text-sm"><i className="fas fa-edit"></i> ایڈٹ</button>
                                            <button onClick={async()=>{if(window.confirm("ڈیلیٹ؟")){await db.collection("products").doc(p.id).delete(); fetchProducts();}}} className="bg-red-50 text-red-600 p-2 rounded text-sm"><i className="fas fa-trash"></i></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'add' && (
                            <form onSubmit={handleSaveProduct} className="bg-white p-6 rounded-lg shadow border space-y-4 text-right">
                                <div>
                                    <label className="block text-gray-700 font-bold mb-1 text-sm">پروڈکٹ کا نام</label>
                                    <input required value={productForm.name} onChange={e=>setProductForm({...productForm, name:e.target.value})} placeholder="مثال: مردانہ بنیان" className="w-full p-2 border rounded"/>
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-bold mb-1 text-sm">قیمت (روپے میں)</label>
                                    <input required type="number" value={productForm.price} onChange={e=>setProductForm({...productForm, price:e.target.value})} placeholder="مثال: 500" className="w-full p-2 border rounded"/>
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-bold mb-1 text-sm">کیٹیگری</label>
                                    <select value={productForm.category} onChange={e=>setProductForm({...productForm, category:e.target.value})} className="w-full p-2 border rounded">{categories.filter(c=>c!=='All').map(c=><option key={c} value={c}>{c}</option>)}</select>
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-bold mb-1 text-sm">تصویر اپلوڈ کریں (آٹو کمپریس)</label>
                                    <input type="file" accept="image/*" onChange={e => setImageFile(e.target.files[0])} className="w-full p-2 border rounded bg-gray-50 text-sm" />
                                    {editingProduct && productForm.image && !imageFile && (
                                        <div className="mt-2">
                                            <p className="text-xs text-gray-500 mb-1">پہلے سے موجود تصویر:</p>
                                            <img src={productForm.image} className="w-16 h-16 rounded object-cover" />
                                        </div>
                                    )}
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-bold mb-1 text-sm">پروڈکٹ کی تفصیل</label>
                                    <textarea required value={productForm.description} onChange={e=>setProductForm({...productForm, description:e.target.value})} placeholder="کپڑے کی کوالٹی، سائز وغیرہ..." className="w-full p-2 border rounded" rows="3"></textarea>
                                </div>
                                <button type="submit" disabled={isSaving} className={`w-full text-white py-3 rounded font-bold ${isSaving ? 'bg-gray-400' : 'bg-emerald-600 hover:bg-emerald-700'}`}>
                                    {isSaving ? 'اپلوڈ ہو رہا ہے... تھوڑا انتظار کریں' : (editingProduct ? 'اپڈیٹ کریں' : 'شامل کریں')}
                                </button>
                            </form>
                        )}
                    </div>
                );
            };

            const HomeView = () => (
                <div>
                    <div className="bg-emerald-50 py-12 text-center px-4 border-b border-emerald-100">
                        <h1 className="text-4xl font-extrabold text-emerald-900 mb-3">New Qari Hosiery Store</h1>
                        <p className="text-gray-600 text-lg">اعلیٰ کوالٹی ہوزری پروڈکٹس - ہول سیل اور ریٹیل</p>
                    </div>

                    <div className="overflow-x-auto py-4 px-4 whitespace-nowrap hide-scrollbar flex justify-center gap-2 bg-white shadow-sm">
                        {categories.map((cat) => (
                            <button 
                                key={cat} 
                                onClick={() => setSelectedCategory(cat)}
                                className={`px-5 py-2 rounded-full font-bold text-sm transition-all ${selectedCategory === cat ? 'bg-emerald-600 text-white shadow-md' : 'bg-gray-100 text-gray-700 hover:bg-emerald-100'}`}
                            >
                                {cat}
                            </button>
                        ))}
                    </div>

                    <div className="p-4 max-w-7xl mx-auto mt-4 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
                        {isLoading ? <div className="col-span-full text-center py-20 text-emerald-600 font-bold text-xl">پروڈکٹس لوڈ ہو رہی ہیں...</div> : 
                        products.filter(p=>selectedCategory==='All'||p.category===selectedCategory).filter(p=>p.name.toLowerCase().includes(searchQuery.toLowerCase())).map(p => (
                            <div key={p.id} className="bg-white rounded-xl shadow-sm hover:shadow-md transition-shadow border border-gray-100 flex flex-col overflow-hidden group cursor-pointer" onClick={() => setSelectedProduct(p)}>
                                <div className="relative overflow-hidden">
                                    <img src={p.image} className="w-full h-40 md:h-56 object-cover group-hover:scale-105 transition-transform duration-300"/>
                                    <div className="absolute top-2 right-2 bg-white/90 text-emerald-700 text-xs font-bold px-2 py-1 rounded shadow-sm">
                                        <i className="fas fa-eye mr-1"></i> تفصیل
                                    </div>
                                </div>
                                <div className="p-3 md:p-4 flex flex-col flex-1">
                                    <h3 className="font-bold text-gray-800 text-sm md:text-base line-clamp-2">{p.name}</h3>
                                    <div className="mt-auto pt-3 flex justify-between items-center">
                                        <span className="text-emerald-700 font-extrabold text-lg">{formatPrice(p.price)}</span>
                                        <button onClick={(e)=>{e.stopPropagation(); addToCart(p);}} className="bg-emerald-100 text-emerald-700 hover:bg-emerald-600 hover:text-white w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center transition-colors">
                                            <i className="fas fa-shopping-cart text-sm"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-20">
                    <Navbar />
                    
                    {toastMessage && <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[100] bg-gray-900 text-white px-6 py-3 rounded-full text-sm font-bold shadow-xl animate-bounce">{toastMessage}</div>}
                    
                    {view === 'home' && <HomeView />}
                    {view === 'admin' && <AdminView />}
                    
                    {selectedProduct && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4" onClick={() => setSelectedProduct(null)}>
                            <div className="bg-white rounded-2xl w-full max-w-md overflow-hidden relative shadow-2xl transform transition-all" onClick={(e) => e.stopPropagation()}>
                                <button onClick={() => setSelectedProduct(null)} className="absolute top-3 left-3 bg-white text-gray-800 w-8 h-8 rounded-full flex items-center justify-center shadow-md hover:bg-gray-100 z-10">
                                    <i className="fas fa-times"></i>
                                </button>
                                <img src={selectedProduct.image} className="w-full h-64 object-cover" />
                                <div className="p-6 text-right">
                                    <span className="bg-emerald-100 text-emerald-800 text-xs px-3 py-1 rounded-full font-bold mb-3 inline-block">{selectedProduct.category}</span>
                                    <h2 className="text-2xl font-extrabold text-gray-900 mb-2">{selectedProduct.name}</h2>
                                    <p className="text-gray-600 text-sm leading-relaxed mb-6 whitespace-pre-line">{selectedProduct.description}</p>
                                    <div className="flex items-center justify-between border-t pt-4">
                                        <span className="text-emerald-700 text-3xl font-extrabold">{formatPrice(selectedProduct.price)}</span>
                                        <button onClick={() => { addToCart(selectedProduct); setSelectedProduct(null); }} className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-lg font-bold shadow-md transition-colors">
                                            <i className="fas fa-plus ml-2"></i> ٹوکری میں ڈالیں
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'cart' && (
                        <div className="p-4 max-w-3xl mx-auto">
                            <button onClick={()=>setView('home')} className="mb-6 text-emerald-600 font-bold flex items-center"><i className="fas fa-arrow-right ml-2"></i> شاپنگ جاری رکھیں</button>
                            <h2 className="text-3xl font-bold mb-6 text-gray-800">آپ کی ٹوکری</h2>
                            {cart.length === 0 ? (
                                <div className="text-center py-20 bg-white rounded-xl shadow-sm border"><i className="fas fa-shopping-basket text-6xl text-gray-200 mb-4 block"></i><p className="text-gray-500 font-bold">آپ کی ٹوکری بالکل خالی ہے۔</p></div>
                            ) : (
                                <div>
                                    {cart.map(i=>(
                                        <div key={i.id} className="bg-white p-4 rounded-xl shadow-sm border mb-3 flex items-center">
                                            <img src={i.image} className="w-16 h-16 rounded-lg object-cover ml-4"/>
                                            <div className="flex-1">
                                                <h4 className="font-bold text-gray-800 line-clamp-1">{i.name}</h4>
                                                <div className="text-emerald-600 font-extrabold">{formatPrice(i.price * i.quantity)}</div>
                                            </div>
                                            <div className="flex items-center space-x-2 space-x-reverse bg-gray-50 rounded-lg p-1 border">
                                                <button onClick={()=>setCart(prev=>prev.map(it=>it.id===i.id?{...it,quantity:it.quantity+1}:it))} className="w-8 h-8 bg-white shadow-sm rounded text-gray-600 hover:text-emerald-600"><i className="fas fa-plus text-xs"></i></button>
                                                <span className="w-8 text-center font-bold">{i.quantity}</span>
                                                <button onClick={()=>setCart(prev=>prev.map(it=>it.id===i.id&&it.quantity>1?{...it,quantity:it.quantity-1}:it))} className="w-8 h-8 bg-white shadow-sm rounded text-gray-600 hover:text-red-600"><i className="fas fa-minus text-xs"></i></button>
                                            </div>
                                            <button onClick={()=>setCart(prev=>prev.filter(it=>it.id!==i.id))} className="text-red-400 hover:text-red-600 mr-4 p-2"><i className="fas fa-trash-alt text-lg"></i></button>
                                        </div>
                                    ))}
                                    <div className="bg-white p-6 rounded-xl shadow-sm border mt-6">
                                        <div className="flex justify-between mb-2 text-gray-600"><span>سامان کی قیمت:</span><span>{formatPrice(cart.reduce((a,b)=>a+(b.price*b.quantity),0))}</span></div>
                                        <div className="flex justify-between mb-4 text-gray-600 border-b pb-4"><span>ڈلیوری چارجز:</span><span>+{formatPrice(DELIVERY_CHARGE)}</span></div>
                                        <div className="flex justify-between font-extrabold text-2xl text-emerald-800 mb-6"><span>کل رقم:</span><span>{formatPrice(cart.reduce((a,b)=>a+(b.price*b.quantity),0)+DELIVERY_CHARGE)}</span></div>
                                        <button onClick={()=>setView('checkout')} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-xl font-bold text-lg shadow-md transition-all">چیک آؤٹ پر جائیں</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                    
                    {view === 'checkout' && (
                        <div className="p-4 max-w-xl mx-auto py-8">
                            <button onClick={()=>setView('cart')} className="mb-6 text-emerald-600 font-bold flex items-center"><i className="fas fa-arrow-right ml-2"></i> واپس ٹوکری میں</button>
                            <div className="bg-white p-6 rounded-xl shadow-lg border">
                                <h2 className="text-2xl font-bold mb-6 border-b pb-4 text-gray-800">ڈلیوری کی معلومات</h2>
                                <form className="space-y-5" onSubmit={async(e)=>{
                                    e.preventDefault();
                                    const cust = { name: e.target.name.value, phone: e.target.phone.value, address: e.target.address.value };
                                    const total = cart.reduce((a,b)=>a+(b.price*b.quantity),0) + DELIVERY_CHARGE;
                                    await db.collection("orders").add({ customer: cust, items: cart, totalAmount: total, date: new Date().toISOString(), status: 'Pending' });
                                    let msg = `*نیا آرڈر موصول ہوا ہے!* 🛍️%0A%0A*👤 نام:* ${cust.name}%0A*📞 فون:* ${cust.phone}%0A*📍 پتہ:* ${cust.address}%0A%0A*💰 کل بل:* Rs. ${total}`;
                                    window.open(`https://wa.me/923065378112?text=${msg}`, '_blank');
                                    setCart([]); setView('success');
                                }}>
                                    <div>
                                        <label className="block text-gray-700 font-bold mb-2 text-sm">مکمل نام</label>
                                        <input name="name" required placeholder="اپنا نام لکھیں" className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all"/>
                                    </div>
                                    <div>
                                        <label className="block text-gray-700 font-bold mb-2 text-sm">موبائل نمبر</label>
                                        <input name="phone" required placeholder="03XX-XXXXXXX" className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all text-left" dir="ltr"/>
                                    </div>
                                    <div>
                                        <label className="block text-gray-700 font-bold mb-2 text-sm">مکمل پتہ (Address)</label>
                                        <textarea name="address" required placeholder="گھر کا نمبر، گلی، علاقہ اور شہر..." className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all" rows="3"></textarea>
                                    </div>
                                    <button className="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-lg font-bold text-lg shadow-md mt-4 flex justify-center items-center">
                                        <i className="fab fa-whatsapp text-2xl ml-2"></i> آرڈر کنفرم کریں
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {view === 'success' && (
                        <div className="text-center py-20 px-4 max-w-md mx-auto">
                            <i className="fas fa-check-circle text-7xl text-emerald-500 mb-6 block animate-pulse"></i>
                            <h2 className="text-3xl font-bold mb-4 text-gray-800">آرڈر موصول ہو گیا!</h2>
                            <p className="mb-8 text-gray-600">آپ کا آرڈر کامیابی کے ساتھ درج ہو گیا ہے۔ ہم جلد ہی آپ کے نمبر پر رابطہ کریں گے۔</p>
                            <button onClick={()=>setView('home')} className="bg-emerald-600 hover:bg-emerald-700 text-white px-10 py-3 rounded-lg font-bold shadow-md">مزید شاپنگ کریں</button>
                        </div>
                    )}

                    <a href="https://wa.me/923065378112?text=السلام علیکم، مجھے آپ کے سٹور سے کچھ معلومات چاہیے تھیں۔" target="_blank" className="fixed bottom-6 left-6 bg-green-500 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg text-3xl z-40 hover:bg-green-600 transition-transform hover:scale-110">
                        <i className="fab fa-whatsapp"></i>
                    </a>

                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
